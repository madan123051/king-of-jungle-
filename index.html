<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candyboom - Match 3 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .auth-section {
            padding: 30px 20px;
            text-align: center;
        }

        .auth-section.hidden {
            display: none;
        }

        .btn {
            width: 100%;
            padding: 12px 20px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-google {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-guest {
            background: #f0f0f0;
            color: #333;
        }

        .btn-guest:hover {
            background: #e0e0e0;
        }

        .btn-logout {
            background: #ff6b6b;
            color: white;
        }

        .btn-logout:hover {
            background: #ff5252;
        }

        .game-section {
            padding: 30px 20px;
        }

        .game-section.hidden {
            display: none;
        }

        .user-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .user-name {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .user-score {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .level-select {
            margin-top: 20px;
        }

        .level-select label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }

        .level-select select {
            width: 100%;
            padding: 10px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .game-board {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .candy {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            user-select: none;
        }

        .candy:hover {
            transform: scale(1.05);
        }

        .candy.selected {
            border-color: #667eea;
            transform: scale(1.1);
        }

        .candy-red { background: linear-gradient(135deg, #ff6b6b, #ff5252); }
        .candy-blue { background: linear-gradient(135deg, #4ecdc4, #44a08d); }
        .candy-green { background: linear-gradient(135deg, #a8edea, #fed6e3); }
        .candy-yellow { background: linear-gradient(135deg, #ffd89b, #19547b); }
        .candy-purple { background: linear-gradient(135deg, #a8edea, #fed6e3); }

        .game-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .game-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .booster {
            background: white;
            border: 2px solid #667eea;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        .booster:hover {
            background: #f0f0ff;
            transform: translateY(-2px);
        }

        .booster-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .booster-name {
            font-size: 12px;
            color: #666;
        }

        .btn-play {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍬 Candyboom</h1>
            <p>Match 3 Puzzle Game</p>
        </div>

        <!-- Authentication Section -->
        <div id="authSection" class="auth-section">
            <h2 style="margin-bottom: 20px; color: #667eea;">Login to Play</h2>
            
            <button class="btn btn-google" onclick="loginWithGoogle()">
                <span>🔐</span> Sign in with Google
            </button>

            <div style="margin: 20px 0; text-align: center; color: #999;">
                OR
            </div>

            <button class="btn btn-guest" onclick="loginAsGuest()">
                👤 Play as Guest
            </button>

            <div id="authError" class="error hidden"></div>
        </div>

        <!-- Game Section -->
        <div id="gameSection" class="game-section hidden">
            <div class="user-info">
                <div class="user-name" id="userName">Player</div>
                <div class="user-score">Total Score: <span id="totalScore">0</span></div>
                <div class="user-score">Stars: ⭐ <span id="totalStars">0</span></div>
                <button class="btn btn-logout" onclick="logout()">Logout</button>
            </div>

            <div class="level-select">
                <label for="levelSelect">Select Level:</label>
                <select id="levelSelect" onchange="selectLevel()">
                    <option value="">Choose a level...</option>
                </select>
            </div>

            <div class="game-board">
                <div class="game-stats">
                    <div class="stat">
                        <div class="stat-label">Score</div>
                        <div class="stat-value" id="currentScore">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Moves Left</div>
                        <div class="stat-value" id="movesLeft">20</div>
                    </div>
                </div>

                <div class="game-grid" id="gameGrid"></div>

                <div class="game-controls">
                    <div class="booster" onclick="useBooster('hammer')">
                        <div class="booster-icon">🔨</div>
                        <div class="booster-name">Hammer</div>
                    </div>
                    <div class="booster" onclick="useBooster('lightning')">
                        <div class="booster-icon">⚡</div>
                        <div class="booster-name">Lightning</div>
                    </div>
                    <div class="booster" onclick="useBooster('bomb')">
                        <div class="booster-icon">💣</div>
                        <div class="booster-name">Bomb</div>
                    </div>
                    <div class="booster" onclick="useBooster('shuffle')">
                        <div class="booster-icon">🔀</div>
                        <div class="booster-name">Shuffle</div>
                    </div>
                </div>

                <button class="btn-play" onclick="startGame()">🎮 Start Game</button>
            </div>

            <div id="gameMessage"></div>
        </div>

        <div id="loadingSection" class="loading hidden">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #667eea;">Loading...</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInAnonymously, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
        import { getFirestore, collection, doc, getDoc, setDoc, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
        import { httpsCallable, getFunctions } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-functions.js';

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDOCAbauIOAnUOSLWlwe9Z5PvQq8xyzQGQ",
            authDomain: "king-of-jungle-77f06.firebaseapp.com",
            projectId: "king-of-jungle-77f06",
            storageBucket: "king-of-jungle-77f06.appspot.com",
            messagingSenderId: "993583513273",
            appId: "1:993583513273:web:d4f7e8c9a1b2c3d4e5f6"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const functions = getFunctions(app);

        // Set Google OAuth Client ID
        auth.settings.appVerificationDisabledForTesting = false;

        // Global Game State
        let currentUser = null;
        let currentLevel = 1;
        let currentScore = 0;
        let movesLeft = 20;
        let selectedCandies = [];
        let gameActive = false;

        // Candy colors
        const candyColors = ['candy-red', 'candy-blue', 'candy-green', 'candy-yellow', 'candy-purple'];

        // Login with Google
        window.loginWithGoogle = async function() {
            try {
                showLoading(true);
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({
                    'client_id': '993583513273-0d1o49evnp5obo5ks2re9i3n0mggc15h.apps.googleusercontent.com'
                });
                const result = await signInWithPopup(auth, provider);
                currentUser = result.user;
                
                // Create user profile if first login
                await createUserProfile(result.user);
                
                showLoading(false);
                showMessage('success', `Welcome, ${result.user.displayName}!`);
            } catch (error) {
                showLoading(false);
                console.error('Google login error:', error);
                showMessage('error', `Login failed: ${error.message}`);
            }
        };

        // Login as Guest
        window.loginAsGuest = async function() {
            try {
                showLoading(true);
                const result = await signInAnonymously(auth);
                currentUser = result.user;
                
                // Create user profile if first login
                await createUserProfile(result.user);
                
                showLoading(false);
                showMessage('success', 'Welcome, Guest!');
            } catch (error) {
                showLoading(false);
                console.error('Guest login error:', error);
                showMessage('error', `Login failed: ${error.message}`);
            }
        };

        // Create or update user profile
        async function createUserProfile(user) {
            try {
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        uid: user.uid,
                        email: user.email || 'guest@candyboom.game',
                        displayName: user.displayName || 'Guest Player',
                        profilePicture: user.photoURL || '',
                        currentLevel: 1,
                        totalScore: 0,
                        totalStars: 0,
                        createdAt: new Date(),
                        boosters: {
                            hammer: 5,
                            lightning: 5,
                            bomb: 3,
                            shuffle: 3
                        }
                    });
                }
            } catch (error) {
                console.error('Error creating user profile:', error);
            }
        }

        // Load user data
        async function loadUserData() {
            if (!currentUser) return;

            try {
                const userRef = doc(db, 'users', currentUser.uid);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    document.getElementById('userName').textContent = userData.displayName || 'Player';
                    document.getElementById('totalScore').textContent = userData.totalScore || 0;
                    document.getElementById('totalStars').textContent = userData.totalStars || 0;

                    // Load levels
                    loadLevelSelect();
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }

        // Load level select dropdown
        function loadLevelSelect() {
            const select = document.getElementById('levelSelect');
            select.innerHTML = '<option value="">Choose a level...</option>';
            
            for (let i = 1; i <= 50; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `Level ${i}`;
                select.appendChild(option);
            }
        }

        // Select level
        window.selectLevel = function() {
            const level = document.getElementById('levelSelect').value;
            if (level) {
                currentLevel = parseInt(level);
                currentScore = 0;
                movesLeft = 20 + (currentLevel - 1) * 2;
                updateGameDisplay();
            }
        };

        // Start game
        window.startGame = function() {
            if (!currentLevel) {
                showMessage('error', 'Please select a level first');
                return;
            }

            gameActive = true;
            initializeGameBoard();
            showMessage('success', `Level ${currentLevel} started! Good luck! 🍬`);
        };

        // Initialize game board
        function initializeGameBoard() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';

            for (let i = 0; i < 25; i++) {
                const candy = document.createElement('div');
                candy.className = `candy ${candyColors[Math.floor(Math.random() * candyColors.length)]}`;
                candy.dataset.index = i;
                candy.textContent = '🍭';
                candy.onclick = () => selectCandy(i);
                grid.appendChild(candy);
            }
        }

        // Select candy
        function selectCandy(index) {
            if (!gameActive) return;

            const candy = document.querySelector(`[data-index="${index}"]`);
            candy.classList.toggle('selected');

            if (selectedCandies.includes(index)) {
                selectedCandies = selectedCandies.filter(i => i !== index);
            } else {
                selectedCandies.push(index);
            }

            if (selectedCandies.length >= 3) {
                makeMove();
            }
        }

        // Make a move
        function makeMove() {
            if (selectedCandies.length < 3) return;

            const pointsPerCandy = 10;
            currentScore += selectedCandies.length * pointsPerCandy;
            movesLeft--;
            selectedCandies = [];

            updateGameDisplay();

            // Reinitialize board
            setTimeout(() => {
                initializeGameBoard();
            }, 300);

            if (movesLeft <= 0) {
                endGame();
            }
        }

        // End game
        async function endGame() {
            gameActive = false;
            const stars = currentScore >= 100 ? 3 : currentScore >= 50 ? 2 : 1;
            
            try {
                const saveLevelResult = httpsCallable(functions, 'saveLevelResult');
                await saveLevelResult({
                    levelId: currentLevel.toString(),
                    score: currentScore,
                    stars: stars,
                    moves: 20 + (currentLevel - 1) * 2 - movesLeft,
                    time: new Date().getTime()
                });

                showMessage('success', `Level completed! Score: ${currentScore}, Stars: ${'⭐'.repeat(stars)}`);
                await loadUserData();
            } catch (error) {
                console.error('Error saving level result:', error);
                showMessage('error', 'Error saving your score');
            }
        }

        // Use booster
        window.useBooster = function(boosterType) {
            if (!gameActive) {
                showMessage('error', 'Start a game first!');
                return;
            }

            // Booster logic would go here
            showMessage('success', `${boosterType.toUpperCase()} booster used!`);
        };

        // Update game display
        function updateGameDisplay() {
            document.getElementById('currentScore').textContent = currentScore;
            document.getElementById('movesLeft').textContent = Math.max(0, movesLeft);
        }

        // Logout
        window.logout = async function() {
            try {
                await signOut(auth);
                showMessage('success', 'Logged out successfully');
            } catch (error) {
                console.error('Logout error:', error);
            }
        };

        // Show message
        function showMessage(type, message) {
            const messageDiv = document.getElementById('gameMessage');
            messageDiv.className = type;
            messageDiv.textContent = message;
            messageDiv.classList.remove('hidden');

            setTimeout(() => {
                messageDiv.classList.add('hidden');
            }, 3000);
        }

        // Show loading
        function showLoading(show) {
            document.getElementById('loadingSection').classList.toggle('hidden', !show);
        }

        // Toggle sections
        function toggleSections(showAuth) {
            document.getElementById('authSection').classList.toggle('hidden', !showAuth);
            document.getElementById('gameSection').classList.toggle('hidden', showAuth);
        }

        // Monitor auth state
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                toggleSections(false);
                loadUserData();
            } else {
                currentUser = null;
                toggleSections(true);
            }
        });
    </script>
</body>
</html>
