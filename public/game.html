<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐾 King of Jungle – Animal Boom</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1a0a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .game-container {
            background: #2a1e42;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            text-align: center;
            color: white;
            max-width: 500px;
            width: 95vw;
        }
        h1 {
            margin-bottom: 8px;
            font-size: 1.8rem;
            text-shadow: 2px 2px #ff79c6;
        }

        /* ── Lives row ── */
        .lives-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin-bottom: 10px;
            font-size: 1.6rem;
        }
        .lives-row .tiger { filter: drop-shadow(0 0 6px orange); }
        .lives-row .goat { transition: opacity 0.5s, transform 0.5s; }
        .lives-row .goat.eaten { opacity: 0; transform: scale(0) rotate(90deg); }

        /* ── Tiger attack overlay ── */
        .tiger-attack-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 999;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
        }
        .tiger-attack-overlay.show { display: flex; }
        .tiger-attack-overlay .lunge {
            animation: lunge 0.6s ease-in-out;
        }
        @keyframes lunge {
            0% { transform: translateX(-120px) scale(1); }
            50% { transform: translateX(20px) scale(1.4); }
            100% { transform: translateX(0) scale(1); }
        }

        /* ── Pill-shaped info panels ── */
        .info-panel {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        .info {
            background: linear-gradient(135deg, #6d4f9e, #4a2d7a);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
        }

        button {
            background: #ff79c6;
            border: none;
            color: white;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #c94d8c;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #c94d8c;
        }
        .grid {
            display: grid;
            gap: 5px;
            background: #4e3b6e;
            padding: 10px;
            border-radius: 20px;
            margin: 0 auto 15px;
            width: fit-content;
            touch-action: none;
        }
        .cell {
            width: 55px;
            height: 55px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2);
            user-select: none;
            -webkit-user-select: none;
        }
        .cell.selected {
            outline: 4px solid #fff700;
            outline-offset: 2px;
            transform: scale(1.05);
        }
        .cell.matched {
            animation: pop 0.3s;
        }
        @keyframes pop {
            0% { transform: scale(1); opacity:1; }
            50% { transform: scale(1.3); opacity:0.5; }
            100% { transform: scale(0); opacity:0; }
        }
        .message {
            margin-top: 10px;
            font-size: 1.2rem;
            color: #ffb86c;
            min-height: 1.5em;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 30px 40px;
            border-radius: 20px;
            font-size: 1.5rem;
            text-align: center;
            z-index: 1000;
            transition: transform 0.3s;
        }
        .toast.show { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🐾 Animal Boom 🐾</h1>

    <!-- Lives -->
    <div class="lives-row" id="livesRow"></div>

    <!-- Pill Stats -->
    <div class="info-panel">
        <div class="info">🎚️ Level: <span id="levelDisplay">1</span></div>
        <div class="info">⭐ Score: <span id="scoreDisplay">0</span></div>
        <div class="info">🎯 Target: <span id="targetDisplay">80</span></div>
        <div class="info">👣 Moves: <span id="movesDisplay">22</span></div>
    </div>

    <div class="grid" id="grid"></div>
    <button id="nextLevelBtn">Next Level ▶</button>
    <div class="message" id="message"></div>
</div>

<!-- Tiger attack overlay -->
<div class="tiger-attack-overlay" id="tigerOverlay">
    <span class="lunge">🐯💥🐐</span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
    // ════════════════════════════════════════════════════
    //  GAME LOGIC — EXACTLY from user's original HTML
    //  Only changes: candy emojis → animal emojis
    //  + lives system + moves/target + swipe
    // ════════════════════════════════════════════════════

    // ─── Animal icon pool (replaces allCandy fruits) ───
    const allCandy = ['🐶','🐱','🐻','🦁','🐸','🐵','🦊','🐰'];

    // ─── Current game state ────────────────────────────
    let level = 1;
    let score = 0;
    let rows, cols;
    let board = [];
    let selectedRow = -1, selectedCol = -1;
    let isProcessing = false;

    // ─── Lives + Moves (added on top of original) ──────
    let lives = 5;       // goats
    let movesLeft = 22;
    let targetScore = 80;

    // ─── DOM elements ──────────────────────────────────
    const gridEl = document.getElementById('grid');
    const levelDisplay = document.getElementById('levelDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const targetDisplay = document.getElementById('targetDisplay');
    const movesDisplay = document.getElementById('movesDisplay');
    const messageEl = document.getElementById('message');
    const nextBtn = document.getElementById('nextLevelBtn');
    const livesRow = document.getElementById('livesRow');
    const tigerOverlay = document.getElementById('tigerOverlay');
    const toastEl = document.getElementById('toast');

    // ═══════════════════════════════════════════════════
    //  ORIGINAL LOGIC — UNTOUCHED
    // ═══════════════════════════════════════════════════

    // ─── Determine grid size based on level ────────────
    function setGridSize() {
        if (level <= 20) { rows = 5; cols = 5; }
        else if (level <= 40) { rows = 6; cols = 6; }
        else if (level <= 60) { rows = 7; cols = 7; }
        else { rows = 8; cols = 8; }
    }

    // ─── How many candy types for current level ────────
    function getNumTypes() {
        if (level <= 16) return 4;
        if (level <= 32) return 5;
        if (level <= 48) return 6;
        if (level <= 64) return 7;
        return 8;
    }

    // ─── Random candy from the allowed pool ────────────
    function randomCandy() {
        const numTypes = getNumTypes();
        const pool = allCandy.slice(0, numTypes);
        return pool[Math.floor(Math.random() * pool.length)];
    }

    // ─── Create an empty board filled with random candies ──
    function createRandomBoard() {
        board = [];
        for (let r = 0; r < rows; r++) {
            board[r] = [];
            for (let c = 0; c < cols; c++) {
                board[r][c] = randomCandy();
            }
        }
    }

    // ─── Check if there's any match (3+ in a row/col) ──
    function findMatches() {
        const matches = new Set();
        // horizontal
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols - 2; c++) {
                const val = board[r][c];
                if (!val) continue;
                let len = 1;
                while (c + len < cols && board[r][c + len] === val) len++;
                if (len >= 3) {
                    for (let i = 0; i < len; i++) matches.add(`${r},${c + i}`);
                }
                c += len - 1;
            }
        }
        // vertical
        for (let c = 0; c < cols; c++) {
            for (let r = 0; r < rows - 2; r++) {
                const val = board[r][c];
                if (!val) continue;
                let len = 1;
                while (r + len < rows && board[r + len][c] === val) len++;
                if (len >= 3) {
                    for (let i = 0; i < len; i++) matches.add(`${r + i},${c}`);
                }
                r += len - 1;
            }
        }
        return matches;
    }

    // ─── Remove matches, apply gravity, refill top ─────
    async function resolveMatches(matchedCells) {
        matchedCells.forEach(coord => {
            const [r, c] = coord.split(',').map(Number);
            board[r][c] = null;
        });

        // Gravity
        for (let c = 0; c < cols; c++) {
            let emptyRow = rows - 1;
            for (let r = rows - 1; r >= 0; r--) {
                if (board[r][c] !== null) {
                    if (r !== emptyRow) {
                        board[emptyRow][c] = board[r][c];
                        board[r][c] = null;
                    }
                    emptyRow--;
                }
            }
            for (let r = emptyRow; r >= 0; r--) {
                board[r][c] = randomCandy();
            }
        }

        score += matchedCells.size * 10;
        updateUI();
    }

    // ─── Swap two cells on board ───────────────────────
    function swapCells(r1, c1, r2, c2) {
        const temp = board[r1][c1];
        board[r1][c1] = board[r2][c2];
        board[r2][c2] = temp;
    }

    // ─── Handle player's swap attempt ──────────────────
    async function attemptSwap(row1, col1, row2, col2) {
        if (isProcessing) return;
        isProcessing = true;
        messageEl.textContent = '';

        // Swap them temporarily
        swapCells(row1, col1, row2, col2);
        const matches = findMatches();

        if (matches.size > 0) {
            // Valid move: clear matches (only once, no cascading)
            await resolveMatches(matches);
            clearSelection();
            updateUI();
            messageEl.textContent = `+${matches.size * 10} points!`;

            // ── Moves & win check (added layer) ──
            movesLeft--;
            movesDisplay.textContent = movesLeft;
            if (score >= targetScore) {
                showToast(`⭐ Level ${level} Complete! ⭐`);
            }
        } else {
            // No match – swap back
            swapCells(row1, col1, row2, col2);
            messageEl.textContent = '❌ No match!';
            clearSelection();

            // ── Moves consumed even on fail ──
            movesLeft--;
            movesDisplay.textContent = movesLeft;
        }

        // ── Check moves exhausted ──
        if (movesLeft <= 0 && score < targetScore) {
            await loseLife();
        }

        renderBoard();
        isProcessing = false;
    }

    // ─── Clear the selected cell highlight ─────────────
    function clearSelection() {
        if (selectedRow !== -1 && selectedCol !== -1) {
            const prevCell = document.querySelector(`[data-row='${selectedRow}'][data-col='${selectedCol}']`);
            if (prevCell) prevCell.classList.remove('selected');
        }
        selectedRow = -1;
        selectedCol = -1;
    }

    // ─── Render board to DOM ────────────────────────────
    function renderBoard() {
        gridEl.innerHTML = '';
        gridEl.style.gridTemplateColumns = `repeat(${cols}, 55px)`;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = board[r][c];
                cell.dataset.row = r;
                cell.dataset.col = c;
                cell.addEventListener('click', () => cellClicked(r, c));
                if (selectedRow === r && selectedCol === c) {
                    cell.classList.add('selected');
                }
                gridEl.appendChild(cell);
            }
        }
    }

    // ─── Click handler for a cell ──────────────────────
    //     EXACT SAME LOGIC as original
    function cellClicked(row, col) {
        if (isProcessing) return;

        if (selectedRow === -1) {
            selectedRow = row;
            selectedCol = col;
            renderBoard();
            return;
        }

        if (selectedRow === row && selectedCol === col) {
            clearSelection();
            renderBoard();
            return;
        }

        const rowDiff = Math.abs(selectedRow - row);
        const colDiff = Math.abs(selectedCol - col);
        if ((rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1)) {
            const sr = selectedRow, sc = selectedCol;
            clearSelection();
            renderBoard();
            attemptSwap(sr, sc, row, col);
        } else {
            clearSelection();
            selectedRow = row;
            selectedCol = col;
            renderBoard();
        }
    }

    // ═══════════════════════════════════════════════════
    //  ADDED FEATURES (on top of original logic)
    // ═══════════════════════════════════════════════════

    // ─── Lives system ──────────────────────────────────
    function renderLives() {
        let html = '<span class="tiger">🐯</span> VS ';
        for (let i = 0; i < 5; i++) {
            const eaten = i >= lives ? ' eaten' : '';
            html += `<span class="goat${eaten}" id="goat${i}">🐐</span>`;
        }
        livesRow.innerHTML = html;
    }

    async function loseLife() {
        // Tiger attack animation
        tigerOverlay.classList.add('show');
        await sleep(800);
        tigerOverlay.classList.remove('show');

        lives--;
        renderLives();

        if (lives <= 0) {
            showToast('💀 Game Over! Tiger ate all goats! 💀');
            await sleep(1500);
            // Reset game
            level = 1;
            lives = 5;
            startLevel(level);
            return;
        }

        // Retry same level
        showToast(`🐐 Goat eaten! ${lives} left. Retry...`);
        await sleep(1200);
        hideToast();
        resetLevelState();
    }

    function resetLevelState() {
        targetScore = level * 80;
        movesLeft = Math.max(10, 22 - Math.floor(level / 5));
        score = 0;
        setGridSize();
        createRandomBoard();
        while (findMatches().size > 0) {
            createRandomBoard();
        }
        clearSelection();
        updateUI();
        renderBoard();
        messageEl.textContent = '';
        isProcessing = false;
    }

    // ─── Toast ─────────────────────────────────────────
    function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
    }
    function hideToast() {
        toastEl.classList.remove('show');
    }
    function sleep(ms) {
        return new Promise(r => setTimeout(r, ms));
    }

    // ─── Swipe support ─────────────────────────────────
    let touchStartX = 0, touchStartY = 0, touchStartRow = -1, touchStartCol = -1;

    gridEl.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        const cell = document.elementFromPoint(touch.clientX, touch.clientY);
        if (cell && cell.dataset.row !== undefined) {
            touchStartRow = parseInt(cell.dataset.row);
            touchStartCol = parseInt(cell.dataset.col);
        }
    }, { passive: true });

    gridEl.addEventListener('touchend', (e) => {
        if (touchStartRow === -1) return;
        const touch = e.changedTouches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);

        // Need minimum swipe distance
        if (Math.max(absDx, absDy) < 20) {
            // Too short = treat as tap (handled by click)
            touchStartRow = -1;
            return;
        }

        let targetRow = touchStartRow;
        let targetCol = touchStartCol;

        if (absDx > absDy) {
            targetCol += dx > 0 ? 1 : -1;
        } else {
            targetRow += dy > 0 ? 1 : -1;
        }

        // Bounds check
        if (targetRow >= 0 && targetRow < rows && targetCol >= 0 && targetCol < cols) {
            clearSelection();
            attemptSwap(touchStartRow, touchStartCol, targetRow, targetCol);
        }

        touchStartRow = -1;
    }, { passive: true });

    // ─── Update UI labels ──────────────────────────────
    function updateUI() {
        levelDisplay.textContent = level;
        scoreDisplay.textContent = score;
        targetDisplay.textContent = targetScore;
        movesDisplay.textContent = movesLeft;
    }

    // ─── Start / reset game for a given level ──────────
    //     SAME as original + lives/moves
    function startLevel(lvl) {
        level = lvl;
        targetScore = level * 80;
        movesLeft = Math.max(10, 22 - Math.floor(level / 5));
        score = 0;
        setGridSize();
        createRandomBoard();
        while (findMatches().size > 0) {
            createRandomBoard();
        }
        clearSelection();
        renderLives();
        updateUI();
        renderBoard();
        messageEl.textContent = '';
        isProcessing = false;
        hideToast();
    }

    // ─── Next level button ─────────────────────────────
    nextBtn.addEventListener('click', () => {
        if (score >= targetScore) {
            if (level < 100) {
                startLevel(level + 1);
            } else {
                showToast('🎉 You beat all 100 levels! 🎉');
            }
        } else {
            messageEl.textContent = `Score ${targetScore} to unlock next level!`;
        }
    });

    // ─── Initial load ──────────────────────────────────
    startLevel(1);
</script>
</body>
</html>
