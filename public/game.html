<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>King of Jungle – Animal Boom</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #030f05;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    overflow-x: hidden;
  }

  /* ── Jungle background leaves ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(0,80,20,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,60,10,0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Top Bar ── */
  .top-bar {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 8px;
    position: relative;
    z-index: 10;
  }

  .back-btn {
    background: rgba(255,255,255,0.08);
    border: none;
    color: #a8d5a2;
    font-size: 1.4rem;
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
  }

  .top-title {
    font-family: 'Cinzel Decorative', cursive;
    color: #c8f0a0;
    font-size: 1.1rem;
    text-shadow: 0 0 12px rgba(100,255,100,0.4);
    letter-spacing: 1px;
  }

  /* ── Stats Row (pill shaped) ── */
  .stats-row {
    width: 100%;
    max-width: 480px;
    display: flex;
    gap: 8px;
    padding: 4px 16px 8px;
    justify-content: space-between;
    position: relative;
    z-index: 10;
  }

  .pill {
    background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.05));
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    padding: 8px 18px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .pill-label {
    color: rgba(255,255,255,0.55);
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .pill-value {
    color: #c8f0a0;
    font-size: 1.1rem;
    font-weight: 900;
  }

  /* ── Lives Row ── */
  .lives-row {
    width: 100%;
    max-width: 480px;
    padding: 0 16px 10px;
    position: relative;
    z-index: 10;
  }

  .lives-pill {
    background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50px;
    padding: 8px 18px;
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
  }

  .lives-tiger {
    font-size: 1.6rem;
    line-height: 1;
  }

  .lives-vs {
    color: rgba(255,255,255,0.4);
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0 4px;
  }

  .goat-item {
    font-size: 1.4rem;
    transition: all 0.3s;
  }

  .goat-item.eaten {
    opacity: 0;
    transform: scale(0) rotate(180deg);
  }

  /* ── Grid wrapper ── */
  .grid-wrapper {
    position: relative;
    z-index: 10;
    padding: 8px 16px;
    touch-action: none;
  }

  .grid {
    display: grid;
    gap: 5px;
    background: rgba(0,30,10,0.6);
    padding: 10px;
    border-radius: 20px;
    border: 1px solid rgba(100,200,100,0.15);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    margin: 0 auto;
    width: fit-content;
  }

  /* ── Cells ── */
  .cell {
    width: 58px;
    height: 58px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.1rem;
    cursor: pointer;
    position: relative;
    transition: transform 0.1s;
    user-select: none;
    -webkit-user-select: none;
  }

  /* shine on top */
  .cell::before {
    content: '';
    position: absolute;
    top: 4px; left: 6px; right: 6px;
    height: 35%;
    background: rgba(255,255,255,0.18);
    border-radius: 8px 8px 50% 50%;
    pointer-events: none;
  }

  .cell.selected {
    outline: 3px solid #fff700;
    outline-offset: 2px;
    transform: scale(1.1);
    z-index: 5;
  }

  @keyframes cellPop {
    0%   { transform: scale(1); opacity: 1; }
    40%  { transform: scale(1.35); opacity: 0.6; }
    100% { transform: scale(0); opacity: 0; }
  }

  .cell.pop {
    animation: cellPop 0.32s ease forwards;
  }

  @keyframes cellDrop {
    0%   { transform: translateY(-30px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  .cell.drop {
    animation: cellDrop 0.3s ease forwards;
  }

  /* per-animal colors */
  .a0 { background: linear-gradient(145deg, #e74c3c, #c0392b); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3), 0 4px 8px rgba(231,76,60,0.3); }
  .a1 { background: linear-gradient(145deg, #3498db, #2980b9); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3), 0 4px 8px rgba(52,152,219,0.3); }
  .a2 { background: linear-gradient(145deg, #27ae60, #1e8449); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3), 0 4px 8px rgba(39,174,96,0.3); }
  .a3 { background: linear-gradient(145deg, #f39c12, #d68910); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3), 0 4px 8px rgba(243,156,18,0.3); }
  .a4 { background: linear-gradient(145deg, #9b59b6, #7d3c98); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3), 0 4px 8px rgba(155,89,182,0.3); }
  .a5 { background: linear-gradient(145deg, #e67e22, #ca6f1e); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3), 0 4px 8px rgba(230,126,34,0.3); }
  .a6 { background: linear-gradient(145deg, #e91e8c, #ad1457); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3), 0 4px 8px rgba(233,30,140,0.3); }
  .a7 { background: linear-gradient(145deg, #00bcd4, #0097a7); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3), 0 4px 8px rgba(0,188,212,0.3); }

  /* ── Message bar ── */
  .msg-bar {
    position: relative;
    z-index: 10;
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 16px;
  }

  .msg-text {
    font-size: 1rem;
    font-weight: 700;
    color: #ffb86c;
    text-align: center;
    transition: opacity 0.3s;
  }

  /* ── Bottom Buttons ── */
  .bottom-row {
    width: 100%;
    max-width: 480px;
    display: flex;
    gap: 10px;
    padding: 8px 16px 20px;
    position: relative;
    z-index: 10;
  }

  .btn {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .btn:active { transform: translateY(3px); }

  .btn-next {
    background: linear-gradient(135deg, #56ab2f, #a8e063);
    color: #1a3a00;
    box-shadow: 0 5px 0 #2d6a00;
  }

  .btn-reset {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    color: white;
    box-shadow: 0 5px 0 #9e1515;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(10,30,10,0.97);
    border: 2px solid rgba(100,200,100,0.3);
    border-radius: 24px;
    padding: 28px 36px;
    text-align: center;
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    min-width: 260px;
  }

  .toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: all;
  }

  .toast h2 { color: #c8f0a0; font-size: 1.8rem; margin-bottom: 8px; font-family: 'Cinzel Decorative', cursive; }
  .toast p  { color: rgba(255,255,255,0.7); margin-bottom: 18px; font-size: 1rem; }
  .toast .stars { font-size: 2rem; margin-bottom: 14px; }

  .toast-btn {
    background: linear-gradient(135deg, #56ab2f, #a8e063);
    color: #1a3a00;
    border: none;
    padding: 12px 28px;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    cursor: pointer;
    margin: 4px;
  }

  /* ── Floating score ── */
  .float-score {
    position: fixed;
    color: #fff700;
    font-weight: 900;
    font-size: 1.4rem;
    pointer-events: none;
    z-index: 999;
    animation: floatUp 0.9s ease forwards;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
  }

  /* ── Game Over toast ── */
  .toast.gameover h2 { color: #ff6b6b; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <a href="index.html" class="back-btn">◀</a>
  <div class="top-title">👑 King of Jungle</div>
  <div style="width:40px"></div>
</div>

<!-- Stats (pill shaped) -->
<div class="stats-row">
  <div class="pill">
    <span class="pill-label">Level</span>
    <span class="pill-value" id="levelDisplay">1</span>
  </div>
  <div class="pill">
    <span class="pill-label">Score</span>
    <span class="pill-value" id="scoreDisplay">0</span>
  </div>
  <div class="pill">
    <span class="pill-label">Moves</span>
    <span class="pill-value" id="movesDisplay">20</span>
  </div>
</div>

<!-- Lives (Tiger eats Goat) -->
<div class="lives-row">
  <div class="lives-pill">
    <span class="lives-tiger" id="tigerIcon">🐯</span>
    <span class="lives-vs">VS</span>
    <span id="goatsRow">🐐🐐🐐🐐🐐</span>
  </div>
</div>

<!-- Grid -->
<div class="grid-wrapper">
  <div class="grid" id="grid"></div>
</div>

<!-- Message -->
<div class="msg-bar">
  <div class="msg-text" id="message"></div>
</div>

<!-- Buttons -->
<div class="bottom-row">
  <button class="btn btn-reset" id="resetBtn">🔄 Restart</button>
  <button class="btn btn-next" id="nextBtn">Next Level ▶</button>
</div>

<!-- Win Toast -->
<div class="toast" id="winToast">
  <h2>🎉 Level Clear!</h2>
  <div class="stars" id="toastStars">⭐⭐⭐</div>
  <p id="toastMsg">Amazing! +200 bonus!</p>
  <button class="toast-btn" onclick="nextLevel()">Next Level ▶</button>
  <button class="toast-btn" style="background:rgba(255,255,255,0.1);color:#fff" onclick="closeToast('winToast')">✕ Close</button>
</div>

<!-- Lose Toast -->
<div class="toast gameover" id="loseToast">
  <h2>💀 Game Over</h2>
  <p id="loseMsg">All goats have been eaten by the tiger!</p>
  <button class="toast-btn" onclick="restartGame()">🔄 Restart</button>
</div>

<script>
// ─── Animal pool ─────────────────────────────────────────
const ANIMALS = ['🐯','🦏','🐘','🦚','🐒','🦅','🐆','🦁'];

// ─── Game state ──────────────────────────────────────────
let level = 1;
let score = 0;
let goats = 5;             // lives
let maxMoves = 20;
let movesLeft = 20;
let rows, cols;
let board = [];            // 2D [r][c] = { animal: string, idx: number }
let selectedRow = -1, selectedCol = -1;
let isProcessing = false;

// ─── Swipe state ─────────────────────────────────────────
let touchStartX = 0, touchStartY = 0;
let touchStartRow = -1, touchStartCol = -1;

// ─── DOM ─────────────────────────────────────────────────
const gridEl       = document.getElementById('grid');
const levelDisplay = document.getElementById('levelDisplay');
const scoreDisplay = document.getElementById('scoreDisplay');
const movesDisplay = document.getElementById('movesDisplay');
const messageEl    = document.getElementById('message');
const goatsRow     = document.getElementById('goatsRow');
const tigerEl      = document.getElementById('tigerIcon');

// ─── Grid size ───────────────────────────────────────────
function setGridSize() {
  if      (level <= 20) { rows = 5; cols = 5; }
  else if (level <= 40) { rows = 6; cols = 6; }
  else if (level <= 60) { rows = 7; cols = 7; }
  else                  { rows = 8; cols = 8; }
}

// ─── Moves per level ─────────────────────────────────────
function getMaxMoves() {
  return Math.max(10, 22 - Math.floor(level / 5));
}

// ─── Animal types ─────────────────────────────────────────
function getNumTypes() {
  if (level <= 16) return 4;
  if (level <= 32) return 5;
  if (level <= 48) return 6;
  if (level <= 64) return 7;
  return 8;
}

// ─── Random animal ────────────────────────────────────────
function randomAnimal() {
  const n = getNumTypes();
  const idx = Math.floor(Math.random() * n);
  return { animal: ANIMALS[idx], idx };
}

// ─── Create board ─────────────────────────────────────────
function createBoard() {
  board = [];
  for (let r = 0; r < rows; r++) {
    board[r] = [];
    for (let c = 0; c < cols; c++) {
      board[r][c] = randomAnimal();
    }
  }
}

// ─── Find matches (3+ in row/col) ─────────────────────────
function findMatches() {
  const matches = new Set();
  // horizontal
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols - 2; c++) {
      const val = board[r][c].animal;
      let len = 1;
      while (c + len < cols && board[r][c + len].animal === val) len++;
      if (len >= 3) {
        for (let i = 0; i < len; i++) matches.add(`${r},${c+i}`);
      }
      c += len - 1;
    }
  }
  // vertical
  for (let c = 0; c < cols; c++) {
    for (let r = 0; r < rows - 2; r++) {
      const val = board[r][c].animal;
      let len = 1;
      while (r + len < rows && board[r + len][c].animal === val) len++;
      if (len >= 3) {
        for (let i = 0; i < len; i++) matches.add(`${r+i},${c}`);
      }
      r += len - 1;
    }
  }
  return matches;
}

// ─── Resolve matches (ONE TIME, no cascade) ───────────────
function resolveMatches(matchSet) {
  // Clear matched cells
  matchSet.forEach(coord => {
    const [r, c] = coord.split(',').map(Number);
    board[r][c] = null;
  });

  // Gravity: drop down
  for (let c = 0; c < cols; c++) {
    let empty = rows - 1;
    for (let r = rows - 1; r >= 0; r--) {
      if (board[r][c] !== null) {
        if (r !== empty) {
          board[empty][c] = board[r][c];
          board[r][c] = null;
        }
        empty--;
      }
    }
    // Refill top
    for (let r = empty; r >= 0; r--) {
      board[r][c] = randomAnimal();
    }
  }

  score += matchSet.size * 10;
  updateHUD();
}

// ─── Swap ─────────────────────────────────────────────────
function swapCells(r1, c1, r2, c2) {
  const tmp = board[r1][c1];
  board[r1][c1] = board[r2][c2];
  board[r2][c2] = tmp;
}

// ─── Attempt swap ─────────────────────────────────────────
function attemptSwap(r1, c1, r2, c2) {
  if (isProcessing) return;
  isProcessing = true;
  setMessage('');

  swapCells(r1, c1, r2, c2);
  const matches = findMatches();

  if (matches.size > 0) {
    // Valid — resolve ONCE (no auto-cascade)
    resolveMatches(matches);
    movesLeft--;
    showFloatScore(matches.size * 10);
    setMessage(`+${matches.size * 10} points! 🔥`);
    clearSelection();
    renderBoard();
    updateHUD();
    checkEndConditions();
  } else {
    // No match — swap back
    swapCells(r1, c1, r2, c2);
    setMessage('❌ No match! Try again.');
    clearSelection();
    renderBoard();
  }

  isProcessing = false;
}

// ─── Check end: moves exhausted? score target? ────────────
function checkEndConditions() {
  const target = level * 80;
  if (score >= target) {
    setTimeout(() => showWin(), 300);
    return;
  }
  if (movesLeft <= 0) {
    setTimeout(() => loseLife(), 300);
  }
}

// ─── Win ──────────────────────────────────────────────────
function showWin() {
  const target = level * 80;
  const extra = score - target;
  const stars = extra > 200 ? '⭐⭐⭐' : extra > 80 ? '⭐⭐' : '⭐';
  document.getElementById('toastStars').textContent = stars;
  document.getElementById('toastMsg').textContent = `Score: ${score} | Level ${level} cleared!`;
  document.getElementById('winToast').classList.add('show');
}

// ─── Lose a goat ──────────────────────────────────────────
function loseLife() {
  goats--;
  // Tiger lunge animation
  tigerEl.style.transform = 'scale(1.4) translateX(8px)';
  tigerEl.style.transition = 'transform 0.25s';
  setTimeout(() => {
    tigerEl.style.transform = 'scale(1)';
  }, 350);

  // Eat a goat (mark eaten)
  const goatEls = document.querySelectorAll('.goat-item:not(.eaten)');
  if (goatEls.length > 0) {
    goatEls[goatEls.length - 1].classList.add('eaten');
  }

  updateGoats();
  setMessage(`🐯 Tiger ate a goat! ${goats} goat${goats !== 1 ? 's' : ''} left.`);

  if (goats <= 0) {
    setTimeout(() => {
      document.getElementById('loseMsg').textContent = `Score: ${score} | All goats eaten by the tiger! 😱`;
      document.getElementById('loseToast').classList.add('show');
    }, 500);
  } else {
    // Restart same level
    setTimeout(() => startLevel(level), 800);
  }
}

// ─── Render goats ─────────────────────────────────────────
function updateGoats() {
  const total = 5;
  let html = '';
  for (let i = 0; i < total; i++) {
    const alive = i < goats;
    html += `<span class="goat-item${alive ? '' : ' eaten'}">🐐</span>`;
  }
  goatsRow.innerHTML = html;
}

// ─── Clear selection ──────────────────────────────────────
function clearSelection() {
  selectedRow = -1;
  selectedCol = -1;
}

// ─── Cell click handler ───────────────────────────────────
function cellClicked(row, col) {
  if (isProcessing) return;

  if (selectedRow === -1) {
    selectedRow = row; selectedCol = col;
    renderBoard();
    return;
  }
  if (selectedRow === row && selectedCol === col) {
    clearSelection();
    renderBoard();
    return;
  }
  const rd = Math.abs(selectedRow - row);
  const cd = Math.abs(selectedCol - col);
  if ((rd === 1 && cd === 0) || (rd === 0 && cd === 1)) {
    const sr = selectedRow, sc = selectedCol;
    clearSelection();
    renderBoard();
    attemptSwap(sr, sc, row, col);
  } else {
    clearSelection();
    selectedRow = row; selectedCol = col;
    renderBoard();
  }
}

// ─── Render board ─────────────────────────────────────────
function renderBoard() {
  gridEl.innerHTML = '';
  const cellSize = Math.min(58, Math.floor((window.innerWidth - 52) / cols));
  gridEl.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = `cell a${board[r][c].idx}`;
      cell.style.width = cell.style.height = cellSize + 'px';
      cell.style.fontSize = Math.floor(cellSize * 0.55) + 'px';
      cell.textContent = board[r][c].animal;
      cell.dataset.row = r;
      cell.dataset.col = c;
      if (selectedRow === r && selectedCol === c) cell.classList.add('selected');
      cell.addEventListener('click', () => cellClicked(r, c));
      gridEl.appendChild(cell);
    }
  }

  // Touch/swipe events on grid
  gridEl.addEventListener('touchstart', onTouchStart, { passive: true });
  gridEl.addEventListener('touchend', onTouchEnd, { passive: true });
}

// ─── Swipe support ────────────────────────────────────────
function onTouchStart(e) {
  if (e.touches.length !== 1) return;
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  const el = document.elementFromPoint(touchStartX, touchStartY);
  if (el && el.dataset.row !== undefined) {
    touchStartRow = parseInt(el.dataset.row);
    touchStartCol = parseInt(el.dataset.col);
  } else {
    touchStartRow = -1;
    touchStartCol = -1;
  }
}

function onTouchEnd(e) {
  if (touchStartRow === -1) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const THRESHOLD = 20;

  if (Math.abs(dx) < THRESHOLD && Math.abs(dy) < THRESHOLD) {
    // Tap — handle as click
    cellClicked(touchStartRow, touchStartCol);
    return;
  }

  let tr = touchStartRow, tc = touchStartCol;
  if (Math.abs(dx) > Math.abs(dy)) {
    tc += dx > 0 ? 1 : -1;  // left/right
  } else {
    tr += dy > 0 ? 1 : -1;  // up/down
  }

  if (tr < 0 || tr >= rows || tc < 0 || tc >= cols) return;

  clearSelection();
  renderBoard();
  attemptSwap(touchStartRow, touchStartCol, tr, tc);
}

// ─── HUD update ───────────────────────────────────────────
function updateHUD() {
  levelDisplay.textContent = level;
  scoreDisplay.textContent = score;
  movesDisplay.textContent = movesLeft;
}

// ─── Floating score ───────────────────────────────────────
function showFloatScore(pts) {
  const el = document.createElement('div');
  el.className = 'float-score';
  el.textContent = `+${pts}`;
  const gridRect = gridEl.getBoundingClientRect();
  el.style.left = (gridRect.left + gridRect.width / 2 - 20) + 'px';
  el.style.top  = (gridRect.top + 40) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ─── Message helper ──────────────────────────────────────
function setMessage(txt) {
  messageEl.textContent = txt;
}

// ─── Start level ─────────────────────────────────────────
function startLevel(lvl) {
  level = lvl;
  score = 0;
  setGridSize();
  maxMoves = getMaxMoves();
  movesLeft = maxMoves;
  createBoard();
  // Reshuffle until no initial matches
  let attempts = 0;
  while (findMatches().size > 0 && attempts < 20) { createBoard(); attempts++; }
  clearSelection();
  updateHUD();
  updateGoats();
  renderBoard();
  setMessage(`🎯 Target: ${level * 80} pts in ${movesLeft} moves`);
  isProcessing = false;
}

// ─── Next level ──────────────────────────────────────────
function nextLevel() {
  closeToast('winToast');
  if (level < 100) startLevel(level + 1);
  else setMessage('🏆 You completed all 100 levels!');
}

// ─── Restart ─────────────────────────────────────────────
function restartGame() {
  closeToast('loseToast');
  goats = 5;
  startLevel(1);
}

// ─── Close toast ────────────────────────────────────────
function closeToast(id) {
  document.getElementById(id).classList.remove('show');
}

// ─── Buttons ─────────────────────────────────────────────
document.getElementById('nextBtn').addEventListener('click', () => {
  if (level < 100) startLevel(level + 1);
  else setMessage('🏆 Level 100 reached!');
});
document.getElementById('resetBtn').addEventListener('click', () => startLevel(level));

// ─── Init ────────────────────────────────────────────────
startLevel(1);
</script>
</body>
</html>
