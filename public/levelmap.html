<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>King of Jungle — Level Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#f0c040;--dark:#0a1a0a;--green:#1a4a1a;--btn-green:#2d8a2d;
}

/* ── BODY & BG ── */
body{
  background:#0a1a0a;color:#fff;
  font-family:'Segoe UI',sans-serif;
  overflow-x:hidden;min-height:100vh;
}

/* Fixed parallax background */
.bg-layer{
  position:fixed;inset:0;z-index:0;
  background:url('assets/levelmap_bg.png') center top / cover no-repeat;
  will-change:transform;
  transition:opacity .3s;
}
.bg-overlay{
  position:fixed;inset:0;z-index:1;
  background:linear-gradient(180deg,
    rgba(5,15,5,.65) 0%,
    rgba(5,15,5,.50) 40%,
    rgba(5,15,5,.65) 100%);
}

/* ── ZONE SECTION BACKGROUNDS ── */
.zone-section{
  position:relative;
  background-attachment:local;
  margin:0;padding:0;
  overflow:visible;
}
.zone-section::before{
  content:'';
  position:absolute;inset:0;z-index:0;
  background-size:cover;
  background-position:center top;
  background-repeat:no-repeat;
  opacity:.88;
  pointer-events:none;
}
.zone-section::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;height:80px;z-index:1;
  background:linear-gradient(180deg,transparent 0%,rgba(5,10,5,.7) 100%);
  pointer-events:none;
}
/* Zone 1-2: Starter + Savanna → jungle */
.zone-section[data-zone="1"]::before,
.zone-section[data-zone="2"]::before{
  background-image:url('assets/levelmap_bg.png');
}
/* Zone 3-4: Forest + River Delta → still jungle */
.zone-section[data-zone="3"]::before,
.zone-section[data-zone="4"]::before{
  background-image:url('assets/levelmap_bg.png');
  filter:hue-rotate(15deg) brightness(.9);
}
/* Zone 5-6: Volcano + Lava → volcano */
.zone-section[data-zone="5"]::before,
.zone-section[data-zone="6"]::before{
  background-image:url('assets/levelmap_bg_volcano.png');
}
/* Zone 7-8: Frozen + Desert → frozen */
.zone-section[data-zone="7"]::before,
.zone-section[data-zone="8"]::before{
  background-image:url('assets/levelmap_bg_frozen.png');
}
/* Zone 9-10: Cave + Cosmic → cosmic */
.zone-section[data-zone="9"]::before,
.zone-section[data-zone="10"]::before{
  background-image:url('assets/levelmap_bg_cosmic.png');
}
.zone-section>*{position:relative;z-index:1;}

/* ── FLOATING PARTICLES ── */
.particles{position:fixed;inset:0;z-index:12;pointer-events:none;overflow:hidden;}
.leaf{
  position:absolute;font-size:16px;
  animation:leaffall linear infinite;
  opacity:.7;
}
@keyframes leaffall{
  0%  {transform:translateY(-30px) rotate(0deg) translateX(0);opacity:.8;}
  50% {transform:translateY(50vh) rotate(180deg) translateX(30px);opacity:.6;}
  100%{transform:translateY(110vh) rotate(360deg) translateX(-20px);opacity:0;}
}
.firefly{
  position:absolute;width:4px;height:4px;border-radius:50%;
  background:#ffe066;box-shadow:0 0 6px 2px #ffe066;
  animation:fireflyFloat ease-in-out infinite;
}
@keyframes fireflyFloat{
  0%,100%{transform:translate(0,0);opacity:.3;}
  25%{transform:translate(20px,-25px);opacity:1;}
  50%{transform:translate(-15px,-50px);opacity:.6;}
  75%{transform:translate(25px,-30px);opacity:.9;}
}
.bird{
  position:absolute;font-size:20px;
  animation:birdfly linear infinite;
}
@keyframes birdfly{
  0%  {transform:translateX(-60px);opacity:0;}
  10% {opacity:1;}
  90% {opacity:1;}
  100%{transform:translateX(110vw);opacity:0;}
}

/* ── HEADER ── */
.hdr{
  position:fixed;top:0;left:0;right:0;z-index:300;
  background:linear-gradient(180deg,rgba(0,0,0,.92) 0%,rgba(5,15,5,.85) 100%);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;
  border-bottom:1px solid rgba(240,192,64,.25);
  box-shadow:0 2px 20px rgba(0,0,0,.5);
}
.hdr-logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:17px;color:var(--gold);letter-spacing:.5px;}
.hdr-logo span{font-size:24px;filter:drop-shadow(0 0 6px rgba(240,192,64,.8));}
.hdr-right{display:flex;align-items:center;gap:10px;}
.hdr-avatar{
  width:40px;height:40px;border-radius:50%;
  border:2px solid var(--gold);
  background:linear-gradient(135deg,#2d8a2d,#1a4a1a);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;overflow:hidden;
  box-shadow:0 0 12px rgba(240,192,64,.5);
  transition:transform .15s;
}
.hdr-avatar:active{transform:scale(.9);}
.hdr-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.hdr-name{font-size:13px;color:#ccc;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hdr-level-badge{
  background:var(--gold);color:#000;border-radius:20px;
  padding:3px 10px;font-size:12px;font-weight:800;
  box-shadow:0 0 8px rgba(240,192,64,.5);
}

/* ── SCROLL CONTAINER ── */
.map-wrap{
  position:relative;z-index:3;
  padding-top:68px;padding-bottom:60px;
  overflow-y:auto;height:100vh;
  scroll-behavior:smooth;
}

/* ══════════════════════════════
   ZONE GATE — between every 10 levels
   ══════════════════════════════ */
.zone-gate{
  position:relative;
  margin-bottom:-65px;
  z-index:10;
  display:flex;align-items:center;justify-content:center;
  height:130px;overflow:visible;
}
.zone-gate-inner{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.gate-arch{
  width:180px;height:70px;
  border:4px solid var(--gate-color,#888);
  border-bottom:none;
  border-radius:90px 90px 0 0;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  padding-bottom:8px;
  box-shadow:0 0 20px var(--gate-glow,rgba(255,255,255,.3)),
             inset 0 0 20px rgba(0,0,0,.4);
  background:var(--gate-bg,rgba(0,0,0,.5));
}
.gate-arch::before,.gate-arch::after{
  content:'';position:absolute;bottom:-4px;
  width:14px;height:28px;
  background:var(--gate-color,#888);
  border-radius:0 0 4px 4px;
  box-shadow:0 0 8px var(--gate-glow,rgba(255,255,255,.3));
}
.gate-arch::before{left:-7px;}
.gate-arch::after{right:-7px;}
.gate-icon{font-size:32px;filter:drop-shadow(0 0 8px rgba(255,255,255,.5));animation:gateFloat 3s ease-in-out infinite;}
@keyframes gateFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.gate-line{
  position:absolute;left:0;right:0;bottom:30px;
  border-top:2px dashed rgba(255,255,255,.15);
}
.gate-label{
  font-size:12px;font-weight:700;letter-spacing:1px;
  color:var(--gate-color,#aaa);
  text-shadow:0 0 10px var(--gate-glow,rgba(255,255,255,.3));
  text-transform:uppercase;
}
.gate-stars-total{font-size:11px;color:rgba(255,255,255,.5);}

/* gate sparkles */
.gate-spark{
  position:absolute;font-size:14px;
  animation:sparkFloat ease-in-out infinite;
  pointer-events:none;
}
@keyframes sparkFloat{0%,100%{transform:translateY(0) scale(1);opacity:.6;}50%{transform:translateY(-10px) scale(1.2);opacity:1;}}

/* ── ZONE HEADER (inside zone) ── */
.zone-header{
  text-align:center;
  padding:14px 16px 8px;
  position:relative;
}
.zone-header-bg{
  position:absolute;inset:0;
  background:linear-gradient(180deg,var(--zone-top,rgba(0,50,0,.5)) 0%,transparent 100%);
}
.zone-header-content{position:relative;z-index:1;}
.zone-big-emoji{font-size:42px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5));animation:zoneEmojiPulse 4s ease-in-out infinite;}
@keyframes zoneEmojiPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.zone-title{font-size:18px;font-weight:800;color:#fff;letter-spacing:2px;text-transform:uppercase;text-shadow:0 2px 8px rgba(0,0,0,.8);}
.zone-range{font-size:12px;color:rgba(255,255,255,.55);margin-top:3px;}

/* ── PATH TRACK ── */
.zone-track{
  position:relative;
  width:100%;
  /* height set by JS: 10 levels × 100px = 1000px */
}

/* level-row not used in new absolute layout */

/* Zone path SVG covers entire zone-track */
.zone-path-svg{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:0;}

/* ── LEVEL NODE — 3D Animal Head ── */
.lvl-node{
  position:absolute;z-index:20;
  display:flex;flex-direction:column;align-items:center;
  transform:translateX(-50%) translateY(-50%);
  cursor:pointer;transition:transform .18s;
  -webkit-tap-highlight-color:transparent;
}
.lvl-node:not(.locked):active{transform:translateX(-50%) translateY(-50%) scale(.88)!important;}
.node-head{
  width:68px;height:68px;border-radius:22%;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  box-shadow:0 10px 28px rgba(0,0,0,.8),inset 0 -6px 12px rgba(0,0,0,.45),inset 0 5px 10px rgba(255,255,255,.38);
  border:3px solid rgba(255,255,255,.35);
  transition:transform .18s,box-shadow .18s;
}
/* glass highlight bar at top */
.node-head::after{
  content:'';position:absolute;top:0;left:0;right:0;height:38%;
  background:linear-gradient(to bottom,rgba(255,255,255,.32),rgba(255,255,255,.04));
  border-radius:22% 22% 0 0;pointer-events:none;
}
.lvl-node:not(.locked):not(.current):hover .node-head{transform:scale(1.08);}
.node-emoji{font-size:38px;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,.7));position:relative;z-index:1;}
.node-num{font-size:13px;font-weight:900;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,1),0 0 10px rgba(0,0,0,.8);margin-top:6px;line-height:1;letter-spacing:.5px;background:rgba(0,0,0,.45);padding:2px 7px;border-radius:20px;}
.lvl-node.locked{cursor:default;}
.lvl-node.locked .node-head{
  background:radial-gradient(circle at 35% 30%,#555,#2a2a2a 55%,#111)!important;
  box-shadow:0 4px 12px rgba(0,0,0,.85);border-color:rgba(80,80,80,.3);
  filter:grayscale(0.3);
}
.lvl-node.locked .node-num{color:#555;}
.lvl-node.completed .node-head{border-color:rgba(100,255,120,.45);box-shadow:0 10px 28px rgba(0,0,0,.8),0 0 12px rgba(80,230,100,.35),inset 0 -6px 12px rgba(0,0,0,.45),inset 0 5px 10px rgba(255,255,255,.38);}
.lvl-node.current .node-head::before{
  content:'';position:absolute;inset:-8px;border-radius:22%;
  border:3px solid var(--gold);
  animation:pulseRing 1.6s ease-in-out infinite;pointer-events:none;
  z-index:2;
}
@keyframes pulseRing{0%,100%{box-shadow:0 0 0 0 rgba(240,192,64,.6);}50%{box-shadow:0 0 0 9px rgba(240,192,64,.0);}}
.current-label{
  position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:#000;border-radius:12px;
  padding:2px 8px;font-size:10px;font-weight:800;white-space:nowrap;
  animation:labelBounce 1s ease-in-out infinite;
  box-shadow:0 2px 8px rgba(240,192,64,.55);pointer-events:none;
}
@keyframes labelBounce{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-3px);}}
.lvl-stars{display:flex;gap:2px;margin-top:2px;}
.star{font-size:9px;opacity:.12;}.star.lit{opacity:1;filter:drop-shadow(0 0 3px gold);}

/* ── ROAD PATH ── */
.road-edge{stroke:#1e0e00;stroke-width:22;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.road-fill{stroke:#8a5020;stroke-width:15;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.road-center{stroke:rgba(255,220,80,.3);stroke-width:3;fill:none;stroke-linecap:round;stroke-dasharray:14 10;}
.road-edge.done{stroke:#062006;}
.road-fill.done{stroke:#2a7a2a;}
.road-center.done{stroke:rgba(120,255,120,.45);}

/* ── PROFILE MODAL ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;
  display:none;align-items:flex-end;justify-content:center;
}
.modal-bg.show{display:flex;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(60px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-box{
  background:linear-gradient(180deg,#1a3a1a,#0a1a0a);
  border:1px solid rgba(240,192,64,.3);border-radius:24px 24px 0 0;
  width:100%;max-width:420px;padding:28px 24px 40px;
}
.modal-handle{width:40px;height:4px;background:#444;border-radius:2px;margin:0 auto 20px;}
.modal-avatar{
  width:84px;height:84px;border-radius:50%;margin:0 auto 12px;
  border:3px solid var(--gold);overflow:hidden;
  background:linear-gradient(135deg,#2d8a2d,#1a4a1a);
  display:flex;align-items:center;justify-content:center;font-size:42px;
  box-shadow:0 0 20px rgba(240,192,64,.4);
}
.modal-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.modal-avatar{position:relative;cursor:pointer;}
.avatar-cam{
  position:absolute;bottom:0;right:0;
  width:28px;height:28px;border-radius:50%;
  background:rgba(240,192,64,.95);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;border:2px solid #0a1a0a;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
  transition:transform .2s;
}
.avatar-cam:active{transform:scale(.85);}
.name-edit-row{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:4px;
}
.modal-name{text-align:center;font-size:20px;font-weight:800;color:var(--gold);cursor:pointer;}
.name-edit-btn{
  background:rgba(240,192,64,.15);border:1px solid rgba(240,192,64,.4);
  color:var(--gold);border-radius:8px;padding:4px 10px;font-size:13px;
  cursor:pointer;transition:background .2s;
}
.name-edit-btn:active{background:rgba(240,192,64,.3);}
.name-input-row{
  display:none;align-items:center;gap:8px;justify-content:center;
  margin-bottom:4px;
}
.name-input-row.show{display:flex;}
.name-input{
  background:rgba(255,255,255,.08);border:1.5px solid rgba(240,192,64,.5);
  color:#fff;border-radius:10px;padding:8px 14px;font-size:16px;
  text-align:center;width:180px;outline:none;font-weight:700;
}
.name-save-btn{
  background:var(--gold);border:none;color:#0a1a0a;border-radius:10px;
  padding:8px 14px;font-size:14px;font-weight:800;cursor:pointer;
}
.btn-share{
  background:linear-gradient(135deg,#1a6bd6,#1244a0);
  border:none;color:#fff;border-radius:14px;padding:14px;
  font-size:15px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 16px rgba(18,68,160,.5);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-share:active{transform:scale(.97);}
.modal-name{text-align:center;font-size:20px;font-weight:800;color:var(--gold);margin-bottom:4px;}
.modal-email{text-align:center;font-size:12px;color:#777;margin-bottom:20px;}
.modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.stat-box{background:rgba(255,255,255,.06);border-radius:12px;padding:14px;text-align:center;border:1px solid rgba(255,255,255,.06);}
.stat-val{font-size:24px;font-weight:800;color:var(--gold);}
.stat-lbl{font-size:11px;color:#888;margin-top:2px;}
.modal-btns{display:flex;flex-direction:column;gap:10px;}
.btn-logout{background:transparent;border:1px solid #444;color:#aaa;border-radius:14px;padding:12px;font-size:14px;cursor:pointer;}
.btn-close-modal{background:var(--btn-green);border:none;color:#fff;border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(45,138,45,.5);}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.88);color:#fff;border-radius:20px;
  padding:10px 22px;font-size:14px;z-index:999;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;
  border:1px solid rgba(255,255,255,.1);
}
.toast.show{opacity:1;}
</style>
</head>
<body>

<!-- BACKGROUND LAYERS -->
<div class="bg-layer" id="bgLayer"></div>
<div class="bg-overlay"></div>

<!-- ANIMATED PARTICLES -->
<div class="particles" id="particles"></div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-logo"><span>👑</span> King of Jungle</div>
  <div class="hdr-right">
    <div class="hdr-name" id="hdrName">Guest</div>
    <div class="hdr-level-badge" id="hdrBadge">Lv 1</div>
    <div class="hdr-avatar" id="hdrAvatar" onclick="openProfile()">🦁</div>
  </div>
</div>

<!-- SCROLL MAP -->
<div class="map-wrap" id="mapWrap">
  <div id="mapContent"></div>
</div>

<!-- PROFILE MODAL -->
<div class="modal-bg" id="profileModal" onclick="if(event.target===this)closeProfile()">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <!-- hidden file input for avatar -->
    <input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="handleAvatarFile(this)">

    <div class="modal-avatar" id="mAvatar" onclick="triggerAvatarUpload()">🦁
      <div class="avatar-cam">📷</div>
    </div>

    <!-- name display + edit -->
    <div class="name-edit-row">
      <div class="modal-name" id="mName">Guest</div>
      <button class="name-edit-btn" onclick="toggleNameEdit()">✏️ Edit</button>
    </div>
    <div class="name-input-row" id="nameInputRow">
      <input class="name-input" id="nameInput" type="text" maxlength="20" placeholder="Your name">
      <button class="name-save-btn" onclick="saveName()">Save</button>
    </div>

    <div class="modal-email" id="mEmail"></div>
    <div class="modal-stats">
      <div class="stat-box"><div class="stat-val" id="mLevel">1</div><div class="stat-lbl">Current Level</div></div>
      <div class="stat-box"><div class="stat-val" id="mBest">0</div><div class="stat-lbl">Best Score</div></div>
      <div class="stat-box"><div class="stat-val" id="mDone">0</div><div class="stat-lbl">Completed</div></div>
      <div class="stat-box"><div class="stat-val" id="mStars">0</div><div class="stat-lbl">Total Stars</div></div>
    </div>
    <div class="modal-btns">
      <button class="btn-share" onclick="shareProfile()">🔗 Share Profile</button>
      <button class="btn-close-modal" onclick="closeProfile()">▶ Continue Playing</button>
      <button class="btn-logout" onclick="doLogout()">↩ Logout</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// ZONE DATA — 10 zones, each 10 levels
// ══════════════════════════════════════════
const ZONES = [
  {
    name:'Starter Plains', range:[1,10],
    bigEmoji:'🌿', animal:'🐯',
    gateIcon:'🌴', gateLabel:'Jungle Gate',
    gateColor:'#5aaa5a', gateGlow:'rgba(90,170,90,.6)',
    gateBg:'rgba(10,40,10,.7)',
    topColor:'rgba(0,40,0,.55)',
    sparks:['🍃','🦋','✨']
  },
  {
    name:'Deep Forest', range:[11,20],
    bigEmoji:'🌲', animal:'🦌',
    gateIcon:'⛰️', gateLabel:'Mountain Pass',
    gateColor:'#9abaaa', gateGlow:'rgba(150,186,160,.6)',
    gateBg:'rgba(20,35,25,.7)',
    topColor:'rgba(5,30,20,.55)',
    sparks:['🌿','🐦','💧']
  },
  {
    name:'Mountain Pass', range:[21,30],
    bigEmoji:'⛰️', animal:'🐐',
    gateIcon:'🌊', gateLabel:'River Crossing',
    gateColor:'#4a9abf', gateGlow:'rgba(74,154,191,.6)',
    gateBg:'rgba(5,20,35,.7)',
    topColor:'rgba(5,20,40,.55)',
    sparks:['❄️','🦅','💨']
  },
  {
    name:'River Delta', range:[31,40],
    bigEmoji:'🌊', animal:'🦅',
    gateIcon:'🌋', gateLabel:'Volcano Edge',
    gateColor:'#e05020', gateGlow:'rgba(224,80,32,.6)',
    gateBg:'rgba(40,10,5,.7)',
    topColor:'rgba(40,10,0,.55)',
    sparks:['🔥','💧','🐊']
  },
  {
    name:'Volcano Edge', range:[41,50],
    bigEmoji:'🌋', animal:'🐍',
    gateIcon:'❄️', gateLabel:'Frozen Pass',
    gateColor:'#80d0f0', gateGlow:'rgba(128,208,240,.6)',
    gateBg:'rgba(5,20,35,.7)',
    topColor:'rgba(30,5,5,.55)',
    sparks:['🌋','🔥','💎']
  },
  {
    name:'Frozen Peaks', range:[51,60],
    bigEmoji:'❄️', animal:'🐒',
    gateIcon:'🏜️', gateLabel:'Desert Gate',
    gateColor:'#d4a020', gateGlow:'rgba(212,160,32,.6)',

function spawnParticles(){
  const p = document.getElementById('particles');
  const leaves = ['🍃','🍂','🌿','🍀'];
  // Leaves
  for(let i=0;i<12;i++){
    const el = document.createElement('div');
    el.className = 'leaf';
    el.textContent = leaves[Math.floor(Math.random()*leaves.length)];
    el.style.left = Math.random()*100 + 'vw';
    el.style.animationDuration = (8+Math.random()*12)+'s';
    el.style.animationDelay = (-Math.random()*14)+'s';
    el.style.fontSize = (12+Math.random()*10)+'px';
    p.appendChild(el);
  }
  // Fireflies
  for(let i=0;i<18;i++){
    const el = document.createElement('div');
    el.className = 'firefly';
    el.style.left = Math.random()*100+'vw';
    el.style.top = (10+Math.random()*80)+'vh';
    el.style.animationDuration = (3+Math.random()*5)+'s';
    el.style.animationDelay = (-Math.random()*6)+'s';
    const hue = 50+Math.random()*40;
    el.style.background = `hsl(${hue},100%,75%)`;
    el.style.boxShadow = `0 0 6px 2px hsl(${hue},100%,75%)`;
    p.appendChild(el);
  }
  // Birds (rare)
  for(let i=0;i<3;i++){
    const el = document.createElement('div');
    el.className = 'bird';
    el.textContent = ['🦜','🦅','🦋'][i];
    el.style.top = (10+Math.random()*35)+'vh';
    el.style.animationDuration = (18+Math.random()*20)+'s';
    el.style.animationDelay = (-Math.random()*25)+'s';
    p.appendChild(el);
  }
}

// BUILD MAP
// ══════════════════════════════════════════
function buildMap(){
  const cont = document.getElementById('mapContent');
  cont.innerHTML = '';

  // Road x-positions for 10 levels in a zone (px in 320px wide viewbox)
  // These give a natural winding path: Right→Left→MidRight→Left→Center cycling
  const ROAD_X = [240, 80, 220, 70, 160, 250, 75, 200, 90, 155];
  const ROW_H  = 110;  // px per level slot in SVG
  const PAD_TOP = 10;  // extra top padding in SVG

  ZONES.forEach((zone, zi) => {
    // ── Zone section wrapper
    const section = document.createElement('div');
    section.className = 'zone-section';
    section.setAttribute('data-zone', zi+1);
    cont.appendChild(section);

    // ── Zone header
    const hdr = document.createElement('div');
    hdr.className = 'zone-header';
    hdr.innerHTML = `
      <div class="zone-header-bg" style="background:linear-gradient(180deg,${zone.topColor} 0%,transparent 100%)"></div>
      <div class="zone-header-content">
        <div class="zone-big-emoji">${zone.bigEmoji}</div>
        <div class="zone-title">Zone ${zi+1} · ${zone.name}</div>
        <div class="zone-range">Levels ${zone.range[0]} – ${zone.range[1]}</div>
      </div>`;
    section.appendChild(hdr);

    // ── Zone track: absolute container for nodes + single SVG path
    const levelsInZone = zone.range[1] - zone.range[0] + 1;  // always 10
    const trackH = levelsInZone * ROW_H + PAD_TOP * 2 + 30;  // +30 for last node overflow
    const track = document.createElement('div');
    track.className = 'zone-track';
    track.style.height = trackH + 'px';

    // ─ Build node Y positions (center of each node in track)
    // Level i=0 (first in zone) is at TOP, i=9 at bottom
    // Going top-to-bottom
    const nodeYs = [];
    for(let i = 0; i < levelsInZone; i++){
      nodeYs.push(PAD_TOP + i * ROW_H + ROW_H/2);
    }

    // ─ Smooth catmull-rom road + zone head colors
    const ZONE_HEAD_COLORS = [
  // Zone 1 🐯 Tiger — warm orange radial
  'radial-gradient(circle at 32% 28%,#ff9a3c,#e05a00 55%,#8a2e00)',
  // Zone 2 🦌 Deer — warm golden brown
  'radial-gradient(circle at 32% 28%,#e8c97a,#b07030 55%,#5c3010)',
  // Zone 3 🐐 Goat — cool steel blue
  'radial-gradient(circle at 32% 28%,#90c4f0,#3a7fc0 55%,#0d3a6e)',
  // Zone 4 🦅 Eagle — deep navy blue
  'radial-gradient(circle at 32% 28%,#5a88d8,#1a3a8f 55%,#060f35)',
  // Zone 5 🐍 Snake — vivid jungle green
  'radial-gradient(circle at 32% 28%,#78e060,#228b22 55%,#0a3d0a)',
  // Zone 6 🐒 Monkey — warm amber
  'radial-gradient(circle at 32% 28%,#ffd060,#d4800a 55%,#6b3a00)',
  // Zone 7 🐘 Elephant — soft lavender grey
  'radial-gradient(circle at 32% 28%,#c0b8e8,#7060a8 55%,#2a1e5a)',
  // Zone 8 🦚 Peacock — teal/cyan
  'radial-gradient(circle at 32% 28%,#40e8d0,#0088a0 55%,#003040)',
  // Zone 9 🦁 Lion — deep gold
  'radial-gradient(circle at 32% 28%,#ffe080,#c8960a 55%,#5a3e00)',
  // Zone 10 🐆 Leopard — yellow spot
  'radial-gradient(circle at 32% 28%,#f8e840,#c0a000 55%,#4a3a00)',
];
    const headColors = ZONE_HEAD_COLORS[zi] || ZONE_HEAD_COLORS[0];

    function catmullSeg(pts,i){
      const p0=pts[Math.max(i-1,0)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(i+2,pts.length-1)];
      const cp1x=p1.x+(p2.x-p0.x)/6, cp1y=p1.y+(p2.y-p0.y)/6;
      const cp2x=p2.x-(p3.x-p1.x)/6, cp2y=p2.y-(p3.y-p1.y)/6;
      return `C ${cp1x.toFixed(1)} ${cp1y.toFixed(1)},${cp2x.toFixed(1)} ${cp2y.toFixed(1)},${p2.x} ${p2.y}`;
    }
    const allPts = ROAD_X.map((x,i)=>({x,y:nodeYs[i]}));
    let dFull = `M ${allPts[0].x} ${allPts[0].y}`;
    for(let i=0;i<allPts.length-1;i++) dFull+=' '+catmullSeg(allPts,i);
    const lvInZone = Math.min(Math.max(currentLevel - zone.range[0], 0), levelsInZone-1);
    let dDone='';
    if(lvInZone>0){ dDone=`M ${allPts[0].x} ${allPts[0].y}`; for(let i=0;i<Math.min(lvInZone,allPts.length-1);i++) dDone+=' '+catmullSeg(allPts,i); }

    const svgH = trackH;
    const svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svgEl.setAttribute('class','zone-path-svg');
    svgEl.setAttribute('viewBox',`0 0 320 ${svgH}`);
    svgEl.setAttribute('height', svgH);
    svgEl.setAttribute('preserveAspectRatio','none');
    ['road-edge','road-fill','road-center'].forEach(cls=>{
      const p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('class',cls);p.setAttribute('d',dFull);svgEl.appendChild(p);
    });
    if(dDone){['road-edge done','road-fill done','road-center done'].forEach(cls=>{
      const p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('class',cls);p.setAttribute('d',dDone);svgEl.appendChild(p);
    });}
    track.appendChild(svgEl);

    // ─ Level nodes: absolutely positioned at road x,y
    for(let i = 0; i < levelsInZone; i++){
      const lv      = zone.range[0] + i;
      const stars   = getStars(lv);
      const isDone  = lv < currentLevel || stars > 0;
      const isCur   = lv === currentLevel;
      const isLocked= lv > currentLevel;

      const nx = ROAD_X[i];   // x center
      const ny = nodeYs[i];   // y center

      const node = document.createElement('div');
      node.className = 'lvl-node '+(isCur?'current':isDone?'completed':isLocked?'locked':'playable');
      node.id = 'lvl-'+lv;
      // Position: left = nx% of container, top = ny px
      node.style.left = (nx / 320 * 100) + '%';
      node.style.top  = ny + 'px';

      const [hc1,hc2,hc3] = headColors;
      const headGrad = isLocked
        ? 'radial-gradient(circle at 35% 30%,#555,#2a2a2a 55%,#111)'
        : `radial-gradient(circle at 35% 30%,${hc1},${hc2} 52%,${hc3})`;
      const starsHtml = [1,2,3].map(s=>`<span class="star ${stars>=s?'lit':''}">⭐</span>`).join('');
      if(isLocked){
        node.innerHTML = `
          <div class="node-head" style="background:${headGrad}">
            <span class="node-emoji">🔒</span>
          </div>
          <div class="node-num" style="color:#555">${lv}</div>`;
      } else {
        node.innerHTML = `
          <div class="node-head" style="background:${headGrad}">
            <span class="node-emoji">${zone.animal}</span>
            ${isCur?'<div class="current-label">PLAY!</div>':''}
          </div>
          <div class="node-num">${lv}</div>
          <div class="lvl-stars">${starsHtml}</div>`;
        node.addEventListener('click', ()=>playLevel(lv));
        node.addEventListener('touchend', e=>{e.preventDefault();playLevel(lv);});
      }
      track.appendChild(node);
    }
    section.appendChild(track);

    // ── Zone Gate — INSIDE current zone section, overhangs into next zone
    if(zone.gateIcon){
      let zStars = 0;
      for(let lv=zone.range[0];lv<=zone.range[1];lv++) zStars += getStars(lv);
      const maxStars = 30;
      const unlocked = currentLevel > zone.range[1];

      const gate = document.createElement('div');
      gate.className = 'zone-gate';
      gate.innerHTML = `
        <div class="gate-line"></div>
        <div class="zone-gate-inner">
          <div class="gate-arch" style="
            --gate-color:${unlocked ? zone.gateColor : '#555'};
            --gate-glow:${unlocked ? zone.gateGlow : 'rgba(100,100,100,.3)'};
            --gate-bg:${unlocked ? zone.gateBg : 'rgba(10,10,10,.6)'};
          ">
            <div class="gate-icon" style="filter:${unlocked?'none':'grayscale(1) opacity(.4)'}">
              ${unlocked ? zone.gateIcon : '🔒'}
            </div>
          </div>
          <div class="gate-label" style="color:${unlocked?zone.gateColor:'#555'}">
            ${unlocked ? zone.gateLabel : 'Complete Zone to Unlock'}
          </div>
          ${unlocked ? `<div class="gate-stars-total">⭐ ${zStars}/${maxStars} stars collected</div>` : ''}
        </div>
        ${unlocked ? zone.sparks.map((s,si)=>`
          <div class="gate-spark" style="
            left:${15+si*28}%;top:${20+si*10}%;
            animation-duration:${2+si*.7}s;
            animation-delay:${-si*.5}s;
          ">${s}</div>`).join('') : ''}
      `;
      section.appendChild(gate);  // Inside zone section!
    }
  });
}
function playLevel(lv){
  if(lv > currentLevel){ showToast('🔒 Complete previous levels first!'); return; }
  location.href = 'game.html?level='+lv;
}

// ── Parallax on scroll
document.getElementById('mapWrap').addEventListener('scroll', e => {
  // Parallax: subtle bg switch based on scroll zone
  const scrollY = e.target.scrollTop;
  const totalH = mapEl.scrollHeight;
  const progress = scrollY / totalH;
  // Fade out fixed bg as user scrolls into zone-specific sections
  const bgOpacity = progress < 0.15 ? 1 : Math.max(0, 1 - (progress - 0.15) * 3);
  document.getElementById('bgLayer').style.opacity = bgOpacity;
}, {passive:true});

function updateHeader(){
  const name = localStorage.getItem('koj_player_name') || 'Guest';
  const photo = localStorage.getItem('koj_photo_url');
  document.getElementById('hdrName').textContent = name.split(' ')[0];
  document.getElementById('hdrBadge').textContent = 'Lv ' + currentLevel;
  if(photo) document.getElementById('hdrAvatar').innerHTML = `<img src="${photo}" alt="">`;
}

function openProfile(){
  const name = localStorage.getItem('koj_player_name') || 'Guest';
  const email = localStorage.getItem('koj_email') || '';
  const photo = localStorage.getItem('koj_photo_url');
  const best = parseInt(localStorage.getItem('koj_best')||'0');
  let done=0, totalStars=0;
  for(let i=1;i<=100;i++){
    const s = getStars(i);
    if(s>0){done++;totalStars+=s;}
    else if(i < currentLevel) done++;
  }
  document.getElementById('mName').textContent = name;
  document.getElementById('mEmail').textContent = email;
  document.getElementById('mLevel').textContent = currentLevel;
  document.getElementById('mBest').textContent = best.toLocaleString();
  document.getElementById('mDone').textContent = done;
  document.getElementById('mStars').textContent = totalStars;
  // reset name input row
  document.getElementById('nameInputRow').classList.remove('show');
  document.getElementById('nameInput').value = name;
  // avatar
  const avatarEl = document.getElementById('mAvatar');
  if(photo){
    avatarEl.innerHTML = `<img src="${photo}" alt=""><div class="avatar-cam">📷</div>`;
  } else {
    avatarEl.innerHTML = `🦁<div class="avatar-cam">📷</div>`;
  }
  document.getElementById('profileModal').classList.add('show');
}

function closeProfile(){
  document.getElementById('profileModal').classList.remove('show');
}

/* ── AVATAR UPLOAD + WebP convert ── */
function triggerAvatarUpload(){
  document.getElementById('avatarFileInput').click();
}

function handleAvatarFile(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      // Convert to WebP via canvas (max 200×200px for fast load)
      const canvas = document.createElement('canvas');
      const MAX = 200;
      let w = img.width, h = img.height;
      if(w > h){ h = Math.round(h*(MAX/w)); w=MAX; }
      else { w = Math.round(w*(MAX/h)); h=MAX; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const webpData = canvas.toDataURL('image/webp', 0.82);
      localStorage.setItem('koj_photo_url', webpData);
      // update header + modal
      document.getElementById('hdrAvatar').innerHTML = `<img src="${webpData}" alt="">`;
      const avatarEl = document.getElementById('mAvatar');
      avatarEl.innerHTML = `<img src="${webpData}" alt=""><div class="avatar-cam">📷</div>`;
      showToast('✅ Profile photo updated!');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  input.value = ''; // reset so same file can be re-selected
}

/* ── NAME EDIT ── */
function toggleNameEdit(){
  const row = document.getElementById('nameInputRow');
  const isShown = row.classList.contains('show');
  if(!isShown){
    const name = localStorage.getItem('koj_player_name') || 'Guest';
    document.getElementById('nameInput').value = name;
    row.classList.add('show');
    setTimeout(()=>document.getElementById('nameInput').focus(), 50);
  } else {
    row.classList.remove('show');
  }
}

function saveName(){
  const inp = document.getElementById('nameInput');
  const newName = inp.value.trim();
  if(!newName){ showToast('❌ Name cannot be empty'); return; }
  localStorage.setItem('koj_player_name', newName);
  document.getElementById('mName').textContent = newName;
  document.getElementById('nameInputRow').classList.remove('show');
  updateHeader();
  showToast('✅ Name saved: ' + newName);
}

/* ── SHARE PROFILE ── */
function shareProfile(){
  const name = localStorage.getItem('koj_player_name') || 'Guest';
  const best = parseInt(localStorage.getItem('koj_best')||'0');
  let done=0, totalStars=0;
  for(let i=1;i<=100;i++){
    const s = getStars(i);
    if(s>0){done++;totalStars+=s;}
    else if(i < currentLevel) done++;
  }
  const text = `🦁 ${name} is playing King of Jungle!
🏆 Level ${currentLevel} | ⭐ ${totalStars} Stars | 🎯 ${done} Levels Done | 🥇 Best Score: ${best.toLocaleString()}

Play now: https://candyboom.wildsaura.com`;
  if(navigator.share){
    navigator.share({ title:'King of Jungle – My Progress', text, url:'https://candyboom.wildsaura.com' })
      .catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=>{
      showToast('📋 Profile copied to clipboard!');
    }).catch(()=> showToast('Share not supported on this browser'));
  }
}

function doLogout(){
  ['koj_player_name','koj_guest_mode','koj_photo_url','koj_email'].forEach(k=>localStorage.removeItem(k));
  location.href = 'game.html';
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function scrollToCurrent(){
  setTimeout(()=>{
    const el = document.getElementById('lvl-'+currentLevel);
    if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
  }, 500);
}

scrollToCurrent();
