<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>King of Jungle — Level Map</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{
    --gold:#f0c040; --dark:#0a1a0a; --green:#1a4a1a; --btn-green:#2d8a2d;
  }
  body{background:#0a1a0a;color:#fff;font-family:'Segoe UI',sans-serif;overflow-x:hidden;min-height:100vh;}

  /* ── HEADER ── */
  .hdr{
    position:fixed;top:0;left:0;right:0;z-index:200;
    background:linear-gradient(180deg,rgba(0,0,0,.95) 0%,rgba(10,26,10,.9) 100%);
    backdrop-filter:blur(10px);
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 16px;border-bottom:1px solid rgba(240,192,64,.25);
  }
  .hdr-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;color:var(--gold);}
  .hdr-logo span{font-size:22px;}
  .hdr-right{display:flex;align-items:center;gap:10px;}
  .hdr-avatar{
    width:38px;height:38px;border-radius:50%;
    border:2px solid var(--gold);
    background:linear-gradient(135deg,#2d8a2d,#1a4a1a);
    display:flex;align-items:center;justify-content:center;
    font-size:18px;cursor:pointer;overflow:hidden;
    box-shadow:0 0 10px rgba(240,192,64,.4);
  }
  .hdr-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  .hdr-name{font-size:13px;color:#ccc;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .hdr-level-badge{
    background:var(--gold);color:#000;border-radius:20px;
    padding:3px 10px;font-size:12px;font-weight:700;
  }

  /* ── SCROLL CONTAINER ── */
  .map-wrap{
    padding-top:70px;padding-bottom:40px;
    overflow-y:auto;height:100vh;
    scroll-behavior:smooth;
  }

  /* ── ZONE BANNER ── */
  .zone-banner{
    position:relative;text-align:center;padding:28px 16px 18px;
    margin:0 0 8px;
  }
  .zone-bg{
    position:absolute;inset:0;opacity:.18;background-size:cover;background-position:center;
  }
  .zone-name{font-size:22px;font-weight:800;letter-spacing:2px;text-transform:uppercase;position:relative;}
  .zone-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:4px;position:relative;}
  .zone-emoji{font-size:36px;display:block;margin-bottom:6px;position:relative;}

  /* ── PATH TRACK ── */
  .zone-track{
    position:relative;padding:0 24px 10px;
    display:flex;flex-direction:column;align-items:center;gap:0;
  }

  /* ── LEVEL ROW (zigzag) ── */
  .level-row{
    display:flex;width:100%;justify-content:center;
    align-items:center;position:relative;
    height:88px;
  }
  .level-row.left  .lvl-node{margin-left:10px;align-self:center;}
  .level-row.right .lvl-node{margin-right:10px;align-self:center;}

  /* path SVG connector */
  .path-line{position:absolute;width:100%;height:88px;top:0;left:0;pointer-events:none;z-index:0;}

  /* ── LEVEL NODE ── */
  .lvl-node{
    position:relative;z-index:2;
    width:68px;height:68px;border-radius:50%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;transition:transform .15s,box-shadow .15s;
    flex-shrink:0;
  }
  .lvl-node:active{transform:scale(.92);}

  /* states */
  .lvl-node.locked{
    background:radial-gradient(circle,#2a2a2a 60%,#1a1a1a);
    border:3px solid #444;
    box-shadow:0 4px 12px rgba(0,0,0,.6);
    cursor:default;
  }
  .lvl-node.completed{
    background:radial-gradient(circle,#2d7a2d 60%,#1a4a1a);
    border:3px solid #4caf50;
    box-shadow:0 4px 18px rgba(76,175,80,.5);
  }
  .lvl-node.current{
    background:radial-gradient(circle,#c0860a 60%,#8a5c00);
    border:3px solid var(--gold);
    box-shadow:0 0 0 4px rgba(240,192,64,.35),0 4px 20px rgba(240,192,64,.6);
    animation:pulse-node 1.8s ease-in-out infinite;
  }
  .lvl-node.playable{
    background:radial-gradient(circle,#1e6b1e 60%,#0f3f0f);
    border:3px solid #6abf6a;
    box-shadow:0 4px 16px rgba(106,191,106,.4);
  }
  @keyframes pulse-node{
    0%,100%{box-shadow:0 0 0 4px rgba(240,192,64,.35),0 4px 20px rgba(240,192,64,.6);}
    50%{box-shadow:0 0 0 8px rgba(240,192,64,.2),0 4px 28px rgba(240,192,64,.8);}
  }

  .lvl-num{font-size:18px;font-weight:800;line-height:1;}
  .lvl-emoji{font-size:22px;line-height:1;}
  .lvl-lock{font-size:22px;opacity:.5;}
  .lvl-stars{display:flex;gap:2px;margin-top:2px;}
  .star{font-size:11px;opacity:.3;}.star.lit{opacity:1;}

  /* current label */
  .current-label{
    position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);
    background:var(--gold);color:#000;border-radius:10px;
    padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;
  }

  /* ── ZONE COLORS ── */
  .zone-0{--zc:#2d8a2d;--zb:linear-gradient(135deg,#0a2a0a,#1a4a1a);}
  .zone-1{--zc:#5a8a2d;--zb:linear-gradient(135deg,#1a2a0a,#3a5a1a);}
  .zone-2{--zc:#3a6a3a;--zb:linear-gradient(135deg,#0a1a10,#1a3a2a);}
  .zone-3{--zc:#2d6a8a;--zb:linear-gradient(135deg,#0a1a2a,#1a3a4a);}
  .zone-4{--zc:#8a4a2d;--zb:linear-gradient(135deg,#2a1a0a,#4a2a1a);}
  .zone-5{--zc:#c0400a;--zb:linear-gradient(135deg,#2a0a0a,#4a1a0a);}
  .zone-6{--zc:#4a8aaa;--zb:linear-gradient(135deg,#0a1a2a,#1a3a4a);}
  .zone-7{--zc:#8a5a2d;--zb:linear-gradient(135deg,#1a1000,#3a2a0a);}
  .zone-8{--zc:#5a2d8a;--zb:linear-gradient(135deg,#1a0a2a,#2a1a4a);}
  .zone-9{--zc:#2d4a8a;--zb:linear-gradient(135deg,#00000a,#0a0a2a);}

  /* path colors per zone */
  .path-line path{stroke:rgba(255,255,255,.12);stroke-width:8;fill:none;stroke-linecap:round;stroke-dasharray:12 8;}
  .path-line path.done{stroke:rgba(76,175,80,.5);stroke-dasharray:none;}

  /* ── PROFILE MODAL ── */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;
    display:none;align-items:flex-end;justify-content:center;
  }
  .modal-bg.show{display:flex;}
  .modal-box{
    background:linear-gradient(180deg,#1a3a1a,#0a1a0a);
    border:1px solid rgba(240,192,64,.3);border-radius:24px 24px 0 0;
    width:100%;max-width:420px;padding:28px 24px 36px;
  }
  .modal-handle{width:40px;height:4px;background:#444;border-radius:2px;margin:0 auto 20px;}
  .modal-avatar{
    width:80px;height:80px;border-radius:50%;margin:0 auto 12px;
    border:3px solid var(--gold);overflow:hidden;
    background:linear-gradient(135deg,#2d8a2d,#1a4a1a);
    display:flex;align-items:center;justify-content:center;font-size:40px;
  }
  .modal-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  .modal-name{text-align:center;font-size:20px;font-weight:700;color:var(--gold);margin-bottom:4px;}
  .modal-email{text-align:center;font-size:12px;color:#888;margin-bottom:20px;}
  .modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
  .stat-box{background:rgba(255,255,255,.06);border-radius:12px;padding:14px;text-align:center;}
  .stat-val{font-size:22px;font-weight:800;color:var(--gold);}
  .stat-lbl{font-size:11px;color:#888;margin-top:2px;}
  .modal-btns{display:flex;flex-direction:column;gap:10px;}
  .btn-logout{
    background:transparent;border:1px solid #444;color:#aaa;
    border-radius:14px;padding:12px;font-size:14px;cursor:pointer;
  }
  .btn-close-modal{
    background:var(--btn-green);border:none;color:#fff;
    border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;
  }

  /* ── TOAST ── */
  .toast{
    position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.85);color:#fff;border-radius:20px;
    padding:10px 20px;font-size:14px;z-index:999;
    opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-logo"><span>👑</span> King of Jungle</div>
  <div class="hdr-right">
    <div class="hdr-name" id="hdrName">Guest</div>
    <div class="hdr-level-badge" id="hdrBadge">Lv 1</div>
    <div class="hdr-avatar" id="hdrAvatar" onclick="openProfile()">🦁</div>
  </div>
</div>

<!-- SCROLL MAP -->
<div class="map-wrap" id="mapWrap">
  <div id="mapContent"></div>
</div>

<!-- PROFILE MODAL -->
<div class="modal-bg" id="profileModal" onclick="if(event.target===this)closeProfile()">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-avatar" id="mAvatar">🦁</div>
    <div class="modal-name" id="mName">Guest</div>
    <div class="modal-email" id="mEmail"></div>
    <div class="modal-stats">
      <div class="stat-box"><div class="stat-val" id="mLevel">1</div><div class="stat-lbl">Current Level</div></div>
      <div class="stat-box"><div class="stat-val" id="mBest">0</div><div class="stat-lbl">Best Score</div></div>
      <div class="stat-box"><div class="stat-val" id="mDone">0</div><div class="stat-lbl">Completed</div></div>
      <div class="stat-box"><div class="stat-val" id="mStars">0</div><div class="stat-lbl">Total Stars</div></div>
    </div>
    <div class="modal-btns">
      <button class="btn-close-modal" onclick="closeProfile()">▶ Continue Playing</button>
      <button class="btn-logout" onclick="doLogout()">↩ Logout</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const ZONES = [
  {name:'Starter Plains', emoji:'🌿', levels:[1,10]},
  {name:'Deep Forest',    emoji:'🌲', levels:[11,20]},
  {name:'Mountain Pass',  emoji:'⛰️', levels:[21,30]},
  {name:'River Delta',    emoji:'🌊', levels:[31,40]},
  {name:'Volcano Edge',   emoji:'🌋', levels:[41,50]},
  {name:'Frozen Peaks',   emoji:'❄️', levels:[51,60]},
  {name:'Desert Ruins',   emoji:'🏜️', levels:[61,70]},
  {name:'Shadow Jungle',  emoji:'🌙', levels:[71,80]},
  {name:'Celestial Canyon',emoji:'✨',levels:[81,90]},
  {name:'Cosmic Realm',   emoji:'🌌', levels:[91,100]},
];

// Animal emoji per level (cycles through unlocked animals)
const ANIMALS = ['🐯','🦌','🐐','🦅','🐍','🐒','🐘','🦚','🦁','🐆'];

function getLevelEmoji(lv){
  const idx = Math.floor((lv-1)/10);
  return ANIMALS[idx % ANIMALS.length];
}

// ── STATE ──
let currentLevel = parseInt(localStorage.getItem('koj_current_level')||'1');
if(currentLevel < 1) currentLevel = 1;
if(currentLevel > 100) currentLevel = 100;

// Stars per level: stored as "koj_stars_X" = 0-3
function getStars(lv){ return parseInt(localStorage.getItem('koj_stars_'+lv)||'0'); }

// ══════════════════════════════════════════
// BUILD MAP
// ══════════════════════════════════════════
function buildMap(){
  const cont = document.getElementById('mapContent');
  cont.innerHTML = '';

  ZONES.forEach((zone, zi) => {
    // Zone banner
    const banner = document.createElement('div');
    banner.className = `zone-banner zone-${zi}`;
    banner.style.background = getComputedStyle(document.documentElement)
      .getPropertyValue(`--zb`) || `linear-gradient(135deg,#0a2a0a,#1a4a1a)`;
    banner.innerHTML = `
      <span class="zone-emoji">${zone.emoji}</span>
      <div class="zone-name">Zone ${zi+1} — ${zone.name}</div>
      <div class="zone-sub">Levels ${zone.levels[0]} – ${zone.levels[1]}</div>
    `;
    // Color banner per zone
    const colors = [
      '#0f2f0f','#1a2f0a','#0a1f10','#0a1520','#201008',
      '#200808','#081520','#180f00','#100820','#02020f'
    ];
    banner.style.background = colors[zi];
    cont.appendChild(banner);

    // Track
    const track = document.createElement('div');
    track.className = `zone-track zone-${zi}`;

    const levelNums = [];
    for(let l = zone.levels[0]; l <= zone.levels[1]; l++) levelNums.push(l);

    levelNums.forEach((lv, i) => {
      const isLeft  = (i % 2 === 0);
      const stars   = getStars(lv);
      const isDone  = lv < currentLevel || stars > 0;
      const isCur   = lv === currentLevel;
      const isPlay  = lv === currentLevel; // only current is "play now"
      const isLocked= lv > currentLevel;

      const row = document.createElement('div');
      row.className = 'level-row ' + (isLeft ? 'left' : 'right');

      // Path SVG
      if(i < levelNums.length - 1){
        const pathDone = isDone && (lv+1 < currentLevel);
        // Create simple curved path
        const svgPath = `
          <svg class="path-line" viewBox="0 0 320 88" preserveAspectRatio="none">
            <path class="${pathDone?'done':''}" d="
              ${isLeft
                ? 'M 160 10 Q 240 44 160 78'
                : 'M 160 10 Q 80 44 160 78'}
            "/>
          </svg>`;
        row.innerHTML = svgPath;
      }

      // Node
      const node = document.createElement('div');
      node.className = 'lvl-node ' + (isCur?'current': isDone?'completed': isLocked?'locked':'playable');
      node.id = 'lvl-'+lv;
      node.style.marginLeft = isLeft ? 'auto' : '0';
      node.style.marginRight = isLeft ? '0' : 'auto';

      if(isLocked){
        node.innerHTML = `
          <div class="lvl-lock">🔒</div>
          <div style="font-size:11px;color:#555;margin-top:2px">${lv}</div>`;
      } else {
        const starsHtml = [1,2,3].map(s=>`<span class="star ${stars>=s?'lit':''}">⭐</span>`).join('');
        node.innerHTML = `
          <div class="lvl-emoji">${getLevelEmoji(lv)}</div>
          <div class="lvl-num" style="color:${isCur?'#fff':isDone?'#a0ffa0':'#fff'}">${lv}</div>
          <div class="lvl-stars">${starsHtml}</div>
          ${isCur ? '<div class="current-label">PLAY!</div>' : ''}
        `;
        node.addEventListener('click', ()=>playLevel(lv));
        node.addEventListener('touchend', (e)=>{e.preventDefault();playLevel(lv);});
      }

      row.appendChild(node);
      track.appendChild(row);
    });

    cont.appendChild(track);
  });
}

function playLevel(lv){
  if(lv > currentLevel){ showToast('🔒 Complete previous levels first!'); return; }
  location.href = 'game.html?level='+lv;
}

// ══════════════════════════════════════════
// SCROLL TO CURRENT LEVEL
// ══════════════════════════════════════════
function scrollToCurrent(){
  setTimeout(()=>{
    const el = document.getElementById('lvl-'+currentLevel);
    if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
  }, 400);
}

// ══════════════════════════════════════════
// HEADER
// ══════════════════════════════════════════
function updateHeader(){
  const name = localStorage.getItem('koj_player_name') || 'Guest';
  const photo = localStorage.getItem('koj_photo_url');
  document.getElementById('hdrName').textContent = name.split(' ')[0];
  document.getElementById('hdrBadge').textContent = 'Lv ' + currentLevel;
  if(photo){
    document.getElementById('hdrAvatar').innerHTML = `<img src="${photo}" alt="">`;
  }
}

// ══════════════════════════════════════════
// PROFILE MODAL
// ══════════════════════════════════════════
function openProfile(){
  const name = localStorage.getItem('koj_player_name') || 'Guest';
  const email = localStorage.getItem('koj_email') || '';
  const photo = localStorage.getItem('koj_photo_url');
  const best = parseInt(localStorage.getItem('koj_best')||'0');
  // count completed
  let done=0, totalStars=0;
  for(let i=1;i<=100;i++){
    const s = getStars(i);
    if(s>0){done++;totalStars+=s;}
    else if(i < currentLevel){done++;}
  }
  document.getElementById('mName').textContent = name;
  document.getElementById('mEmail').textContent = email;
  document.getElementById('mLevel').textContent = currentLevel;
  document.getElementById('mBest').textContent = best.toLocaleString();
  document.getElementById('mDone').textContent = done;
  document.getElementById('mStars').textContent = totalStars;
  if(photo){
    document.getElementById('mAvatar').innerHTML = `<img src="${photo}" alt="">`;
  }
  document.getElementById('profileModal').classList.add('show');
}
function closeProfile(){
  document.getElementById('profileModal').classList.remove('show');
}
function doLogout(){
  ['koj_player_name','koj_guest_mode','koj_photo_url','koj_email'].forEach(k=>localStorage.removeItem(k));
  location.href = 'game.html'; // back to login
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
buildMap();
updateHeader();
scrollToCurrent();
</script>
</body>
</html>
