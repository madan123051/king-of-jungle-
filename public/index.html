<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>🐾 Animal Boom – Match 3 Puzzle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap');

  :root {
    --bg:       #1a0a2e;
    --panel:    #2d1b4e;
    --accent:   #ff6bcb;
    --gold:     #ffd700;
    --green:    #50fa7b;
    --blue:     #8be9fd;
    --purple:   #bd93f9;
    --red:      #ff5555;
    --orange:   #ffb86c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 20%, #3d1a6e33 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, #1a3d6e33 0%, transparent 60%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-family: 'Nunito', sans-serif;
    overflow-x: hidden;
  }

  /* ─── TOP BAR ─────────────────────────────────── */
  .topbar {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px 8px;
  }
  .topbar-logo {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: var(--accent);
    text-shadow: 0 0 12px #ff6bcb88;
    letter-spacing: 1px;
  }
  .topbar-logo span { color: var(--gold); }

  .lives {
    display: flex;
    gap: 4px;
    font-size: 1.4rem;
  }
  .lives .heart { transition: transform 0.3s; }
  .lives .heart.lost { opacity: 0.3; filter: grayscale(1); transform: scale(0.8); }

  /* ─── LEVEL PROGRESS ─────────────────────────── */
  .level-bar-wrap {
    width: 100%;
    max-width: 480px;
    padding: 0 18px 10px;
  }
  .level-row {
    display: flex;
    justify-content: space-between;
    color: #ccc;
    font-size: 0.9rem;
    margin-bottom: 5px;
  }
  .level-row b { color: var(--gold); }
  .progress-bg {
    background: #ffffff20;
    border-radius: 30px;
    height: 14px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 30px;
    background: linear-gradient(90deg, #a855f7, #ec4899, #f97316);
    transition: width 0.5s cubic-bezier(.47,1.64,.41,.8);
  }

  /* ─── STATS ROW ───────────────────────────────── */
  .stats {
    width: 100%;
    max-width: 480px;
    display: flex;
    gap: 10px;
    padding: 0 18px 12px;
  }
  .stat-card {
    flex: 1;
    background: var(--panel);
    border-radius: 16px;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    border: 1px solid #ffffff15;
    box-shadow: 0 4px 12px #00000033;
  }
  .stat-label { font-size: 0.72rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 1.5rem; color: white; font-weight: 800; line-height: 1.2; }
  .stat-value.score-val { color: var(--gold); }
  .stat-value.moves-val { color: var(--green); }
  .stat-value.target-val { color: var(--blue); }

  /* ─── GRID ────────────────────────────────────── */
  .grid-wrap {
    padding: 0 12px;
    width: 100%;
    max-width: 480px;
  }
  .grid {
    display: grid;
    gap: 6px;
    background: var(--panel);
    padding: 12px;
    border-radius: 22px;
    border: 1px solid #ffffff10;
    box-shadow: 0 8px 32px #00000066, inset 0 1px 0 #ffffff15;
    margin: 0 auto;
  }
  .cell {
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    user-select: none;
    will-change: transform;
  }
  .cell::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 45%;
    border-radius: 14px 14px 50% 50% / 14px 14px 40% 40%;
    background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 100%);
    pointer-events: none;
  }
  .cell:hover { transform: scale(1.06); }
  .cell:active { transform: scale(0.94); }

  .cell.selected {
    transform: scale(1.12) !important;
    box-shadow: 0 0 0 3px #fff700, 0 0 20px #fff70099 !important;
    z-index: 10;
  }
  .cell.hint {
    animation: hint-pulse 0.6s ease-in-out 2;
  }

  /* Background colors per animal type */
  .c0 { background: linear-gradient(135deg, #e63946, #c1121f); box-shadow: 0 5px 0 #8b0000, 0 6px 12px #e6394666; }
  .c1 { background: linear-gradient(135deg, #f77f00, #d62828); box-shadow: 0 5px 0 #9c4000, 0 6px 12px #f77f0066; }
  .c2 { background: linear-gradient(135deg, #f9c74f, #f3722c); box-shadow: 0 5px 0 #9a6500, 0 6px 12px #f9c74f66; }
  .c3 { background: linear-gradient(135deg, #43aa8b, #277da1); box-shadow: 0 5px 0 #1a5c40, 0 6px 12px #43aa8b66; }
  .c4 { background: linear-gradient(135deg, #4cc9f0, #4361ee); box-shadow: 0 5px 0 #1a3080, 0 6px 12px #4cc9f066; }
  .c5 { background: linear-gradient(135deg, #7b2d8b, #c77dff); box-shadow: 0 5px 0 #4a1060, 0 6px 12px #7b2d8b66; }
  .c6 { background: linear-gradient(135deg, #ff4d6d, #c9184a); box-shadow: 0 5px 0 #800020, 0 6px 12px #ff4d6d66; }
  .c7 { background: linear-gradient(135deg, #52b788, #1b4332); box-shadow: 0 5px 0 #0a1e16, 0 6px 12px #52b78866; }

  /* ─── BOOSTER BAR ─────────────────────────────── */
  .boosters {
    width: 100%;
    max-width: 480px;
    display: flex;
    gap: 10px;
    padding: 12px 18px 6px;
    justify-content: center;
  }
  .boost-btn {
    flex: 1;
    background: var(--panel);
    border: none;
    border-radius: 16px;
    padding: 10px 6px;
    color: white;
    font-size: 1.6rem;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    border: 1px solid #ffffff15;
    box-shadow: 0 4px 0 #00000055;
    position: relative;
  }
  .boost-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #00000055; }
  .boost-btn.active { border-color: var(--gold); box-shadow: 0 0 12px var(--gold); }
  .boost-label { font-size: 0.65rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
  .boost-count {
    position: absolute; top: 4px; right: 6px;
    background: var(--accent); border-radius: 50%;
    width: 18px; height: 18px;
    font-size: 0.65rem; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }

  /* ─── ACTION BTNS ─────────────────────────────── */
  .action-row {
    width: 100%;
    max-width: 480px;
    display: flex;
    gap: 10px;
    padding: 8px 18px 16px;
  }
  .btn {
    flex: 1;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    border: none;
    color: white;
    padding: 13px;
    font-size: 1rem;
    font-weight: 800;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 5px 0 #6b21a8, 0 6px 16px #a855f755;
    font-family: 'Nunito', sans-serif;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #6b21a8; }
  .btn.secondary {
    background: linear-gradient(135deg, #374151, #1f2937);
    box-shadow: 0 5px 0 #111827;
  }

  /* ─── TOAST / POPUP ───────────────────────────── */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: rgba(30,15,50,0.95);
    border: 2px solid var(--accent);
    border-radius: 24px;
    padding: 28px 40px;
    text-align: center;
    color: white;
    z-index: 100;
    transition: transform 0.3s cubic-bezier(.47,1.64,.41,.8), opacity 0.3s;
    min-width: 260px;
    box-shadow: 0 20px 60px #00000088, 0 0 40px #ff6bcb44;
    opacity: 0;
  }
  .toast.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  .toast-icon { font-size: 4rem; margin-bottom: 8px; }
  .toast-title { font-family: 'Fredoka One', cursive; font-size: 2rem; margin-bottom: 6px; }
  .toast-msg { color: #ccc; font-size: 0.95rem; margin-bottom: 18px; }
  .toast .btn { font-size: 1.1rem; padding: 14px 30px; }

  /* ─── FLOATING SCORE ──────────────────────────── */
  .float-score {
    position: absolute;
    color: var(--gold);
    font-size: 1.4rem;
    font-weight: 800;
    pointer-events: none;
    z-index: 50;
    animation: float-up 0.9s ease-out forwards;
    text-shadow: 0 2px 8px #000;
  }
  @keyframes float-up {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-70px) scale(1.2); }
  }

  /* ─── ANIMATIONS ──────────────────────────────── */
  @keyframes pop-out {
    0%   { transform: scale(1); opacity: 1; }
    40%  { transform: scale(1.35); opacity: 0.8; }
    100% { transform: scale(0); opacity: 0; }
  }
  @keyframes drop-in {
    0%   { transform: translateY(-60px) scale(0.7); opacity: 0; }
    70%  { transform: translateY(6px) scale(1.05); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-8px); }
    40%     { transform: translateX(8px); }
    60%     { transform: translateX(-5px); }
    80%     { transform: translateX(5px); }
  }
  @keyframes hint-pulse {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.18); box-shadow: 0 0 20px #fff700; }
  }
  @keyframes level-up-bounce {
    0%   { transform: scale(0.5) rotate(-10deg); }
    60%  { transform: scale(1.1) rotate(3deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  .cell.pop { animation: pop-out 0.35s ease-out forwards; }
  .cell.drop { animation: drop-in 0.4s cubic-bezier(.47,1.64,.41,.8) forwards; }
  .grid.shake { animation: shake 0.4s ease; }
  .toast.level-anim .toast-icon { animation: level-up-bounce 0.6s ease; }

  /* ─── COMBO BADGE ─────────────────────────────── */
  .combo-badge {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translateX(-50%) scale(0);
    font-family: 'Fredoka One', cursive;
    font-size: 2.5rem;
    color: white;
    text-shadow: 0 0 20px var(--accent), 0 3px 0 #000;
    pointer-events: none;
    z-index: 60;
    transition: transform 0.3s cubic-bezier(.47,1.64,.41,.8), opacity 0.3s;
    opacity: 0;
  }
  .combo-badge.show {
    transform: translateX(-50%) scale(1);
    opacity: 1;
    animation: combo-out 1.2s ease-out forwards;
  }
  @keyframes combo-out {
    0%   { transform: translateX(-50%) scale(1.2); opacity: 1; }
    60%  { transform: translateX(-50%) scale(1); opacity: 1; }
    100% { transform: translateX(-50%) scale(0.8); opacity: 0; }
  }

  /* ─── OVERLAY ─────────────────────────────────── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: #00000088;
    z-index: 90;
    backdrop-filter: blur(4px);
  }
  .overlay.show { display: block; }

  /* ─── SCROLLBAR ────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ffffff33; border-radius: 3px; }

  /* ─── RESPONSIVE ───────────────────────────────── */
  @media (max-width: 400px) {
    .topbar-logo { font-size: 1.4rem; }
    .stat-value { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">🐾 Animal<span>Boom</span></div>
  <div class="lives" id="livesEl"></div>
</div>

<!-- LEVEL PROGRESS BAR -->
<div class="level-bar-wrap">
  <div class="level-row">
    <span>Level <b id="levelNum">1</b></span>
    <span>Score <b id="progressScore">0</b> / <b id="progressTarget">500</b></span>
  </div>
  <div class="progress-bg">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat-card">
    <div class="stat-label">Score</div>
    <div class="stat-value score-val" id="scoreEl">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Moves</div>
    <div class="stat-value moves-val" id="movesEl">30</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Target</div>
    <div class="stat-value target-val" id="targetEl">500</div>
  </div>
</div>

<!-- GRID -->
<div class="grid-wrap">
  <div class="grid" id="gridEl"></div>
</div>

<!-- BOOSTERS -->
<div class="boosters">
  <button class="boost-btn" id="boostHammer" onclick="activateBooster('hammer')">
    🔨<div class="boost-label">Hammer</div>
    <div class="boost-count" id="hammerCount">3</div>
  </button>
  <button class="boost-btn" id="boostBomb" onclick="activateBooster('bomb')">
    💣<div class="boost-label">Bomb</div>
    <div class="boost-count" id="bombCount">2</div>
  </button>
  <button class="boost-btn" id="boostLightning" onclick="activateBooster('lightning')">
    ⚡<div class="boost-label">Lightning</div>
    <div class="boost-count" id="lightningCount">2</div>
  </button>
  <button class="boost-btn" id="boostShuffle" onclick="activateBooster('shuffle')">
    🔀<div class="boost-label">Shuffle</div>
    <div class="boost-count" id="shuffleCount">2</div>
  </button>
</div>

<!-- ACTION BUTTONS -->
<div class="action-row">
  <button class="btn secondary" onclick="restartLevel()">🔄 Restart</button>
  <button class="btn" onclick="nextLevelBtn()">Next Level ▶</button>
</div>

<!-- OVERLAY + TOAST -->
<div class="overlay" id="overlay"></div>
<div class="toast" id="toast">
  <div class="toast-icon" id="toastIcon">🎉</div>
  <div class="toast-title" id="toastTitle">Level Clear!</div>
  <div class="toast-msg" id="toastMsg">Awesome work!</div>
  <button class="btn" id="toastBtn" onclick="closeToast()">Continue</button>
</div>

<!-- COMBO BADGE -->
<div class="combo-badge" id="comboBadge">🔥 COMBO x2!</div>

<script>
// ═══════════════════════════════════════════════════════════
//  ANIMAL BOOM  –  Match-3 Puzzle Game
//  Animals: 8 types, background per type
// ═══════════════════════════════════════════════════════════

// ── ANIMALS (8 types) ──────────────────────────────────────
const ANIMALS = ['🦁','🐯','🐼','🦊','🐸','🐨','🐵','🐺'];
// Color class per animal index
const COLOR_CLASS = ['c0','c1','c2','c3','c4','c5','c6','c7'];

// ── GAME CONFIG ────────────────────────────────────────────
const LEVELS = [];
for (let i = 1; i <= 100; i++) {
  let rows, cols, moves, target, types;
  if      (i <= 10)  { rows=5; cols=5; moves=30; target=500  + i*80;  types=4; }
  else if (i <= 20)  { rows=5; cols=6; moves=28; target=1200 + i*100; types=4; }
  else if (i <= 30)  { rows=6; cols=6; moves=26; target=2500 + i*120; types=5; }
  else if (i <= 40)  { rows=6; cols=7; moves=24; target=4500 + i*150; types=5; }
  else if (i <= 50)  { rows=7; cols=7; moves=22; target=7000 + i*180; types=6; }
  else if (i <= 60)  { rows=7; cols=8; moves=22; target=10000+i*200; types=6; }
  else if (i <= 70)  { rows=8; cols=8; moves=20; target=13000+i*220; types=7; }
  else if (i <= 85)  { rows=8; cols=8; moves=18; target=17000+i*250; types=7; }
  else               { rows=8; cols=8; moves=16; target=22000+i*300; types=8; }
  LEVELS.push({ rows, cols, moves, target, types });
}

// ── GAME STATE ─────────────────────────────────────────────
let state = {
  level:   1,
  score:   0,
  moves:   0,
  target:  0,
  lives:   5,
  rows:    5,
  cols:    5,
  types:   4,
  board:   [],
  selected: null,    // {r, c} or null
  processing: false,
  activeBooster: null,
  boosters: { hammer: 3, bomb: 2, lightning: 2, shuffle: 2 },
  combo: 0,
};

// ── CELL SIZE (responsive) ────────────────────────────────
function cellSize() {
  const maxW = Math.min(window.innerWidth - 60, 456);
  const { cols } = state;
  return Math.floor((maxW - 12*2 - 6*(cols-1)) / cols);
}

// ── BOARD INIT ────────────────────────────────────────────
function randAnimal() {
  return Math.floor(Math.random() * state.types);
}

function createBoard() {
  let tries = 0;
  do {
    state.board = Array.from({length: state.rows}, () =>
      Array.from({length: state.cols}, () => randAnimal())
    );
    tries++;
  } while (findAllMatches().size > 0 && tries < 50);
}

// ── MATCH FINDING ─────────────────────────────────────────
function findAllMatches() {
  const { board, rows, cols } = state;
  const matched = new Set();
  // Horizontal
  for (let r = 0; r < rows; r++) {
    let c = 0;
    while (c < cols) {
      const v = board[r][c];
      if (v === null) { c++; continue; }
      let len = 1;
      while (c+len < cols && board[r][c+len] === v) len++;
      if (len >= 3) for (let i=0;i<len;i++) matched.add(`${r},${c+i}`);
      c += len;
    }
  }
  // Vertical
  for (let c = 0; c < cols; c++) {
    let r = 0;
    while (r < rows) {
      const v = board[r][c];
      if (v === null) { r++; continue; }
      let len = 1;
      while (r+len < rows && board[r+len][c] === v) len++;
      if (len >= 3) for (let i=0;i<len;i++) matched.add(`${r+i},${c}`);
      r += len;
    }
  }
  return matched;
}

function parseCoord(s) { const [r,c] = s.split(',').map(Number); return {r,c}; }

// ── GRAVITY + REFILL ──────────────────────────────────────
function applyGravity() {
  const { board, rows, cols } = state;
  for (let c = 0; c < cols; c++) {
    let empty = rows - 1;
    for (let r = rows-1; r >= 0; r--) {
      if (board[r][c] !== null) {
        if (r !== empty) { board[empty][c] = board[r][c]; board[r][c] = null; }
        empty--;
      }
    }
    for (let r = empty; r >= 0; r--) board[r][c] = randAnimal();
  }
}

// ── RESOLVE MATCHES ────────────────────────────────────────
async function resolveMatches(triggeredByMove = false) {
  let totalCleared = 0;
  let cascadeCount = 0;

  while (true) {
    const matched = findAllMatches();
    if (matched.size === 0) break;

    cascadeCount++;
    totalCleared += matched.size;

    // Show combo badge if cascade
    if (cascadeCount > 1) showCombo(cascadeCount);

    // Animate pop
    await animatePop([...matched].map(parseCoord));

    // Score: base 10 × multiplier for cascade
    const gain = matched.size * 10 * cascadeCount;
    state.score += gain;

    // Show floating score
    const coords = [...matched].map(parseCoord);
    const midCoord = coords[Math.floor(coords.length/2)];
    showFloatScore(`+${gain}`, midCoord.r, midCoord.c);

    // Clear matched cells
    matched.forEach(s => {
      const {r,c} = parseCoord(s);
      state.board[r][c] = null;
    });

    applyGravity();
    renderBoard();
    await sleep(220);
  }

  updateUI();
  checkWinLose();
}

// ── SWAP ──────────────────────────────────────────────────
function swap(r1,c1,r2,c2) {
  const tmp = state.board[r1][c1];
  state.board[r1][c1] = state.board[r2][c2];
  state.board[r2][c2] = tmp;
}

async function attemptSwap(r1,c1,r2,c2) {
  if (state.processing) return;
  state.processing = true;
  clearSelection();

  swap(r1,c1,r2,c2);
  const matched = findAllMatches();

  if (matched.size > 0) {
    state.moves--;
    state.combo = 0;
    await resolveMatches(true);
  } else {
    // Swap back with shake animation
    swap(r1,c1,r2,c2);
    renderBoard();
    document.getElementById('gridEl').classList.add('shake');
    setTimeout(() => document.getElementById('gridEl').classList.remove('shake'), 400);
  }

  state.processing = false;
  renderBoard();
  updateUI();
}

// ── CELL CLICK ────────────────────────────────────────────
function cellClicked(r, c) {
  if (state.processing) return;

  // Booster mode
  if (state.activeBooster) {
    applyBoosterToCell(r, c);
    return;
  }

  const sel = state.selected;

  if (!sel) {
    state.selected = {r, c};
    renderBoard();
    return;
  }

  if (sel.r === r && sel.c === c) {
    clearSelection();
    renderBoard();
    return;
  }

  const dr = Math.abs(sel.r - r), dc = Math.abs(sel.c - c);
  if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
    attemptSwap(sel.r, sel.c, r, c);
  } else {
    state.selected = {r, c};
    renderBoard();
  }
}

function clearSelection() {
  state.selected = null;
}

// ── BOOSTERS ─────────────────────────────────────────────
function activateBooster(type) {
  if (state.boosters[type] <= 0) return;
  if (state.activeBooster === type) {
    state.activeBooster = null;
    updateBoosterUI();
    return;
  }
  state.activeBooster = type;
  clearSelection();
  renderBoard();
  updateBoosterUI();
}

async function applyBoosterToCell(r, c) {
  if (state.processing) return;
  const type = state.activeBooster;
  state.processing = true;
  state.boosters[type]--;
  state.activeBooster = null;
  updateBoosterUI();

  const { board, rows, cols } = state;

  if (type === 'hammer') {
    // Remove one cell
    state.score += 30;
    showFloatScore('+30', r, c);
    board[r][c] = null;
    applyGravity();
    renderBoard();
    await sleep(200);
    await resolveMatches();
  }
  else if (type === 'bomb') {
    // Remove 3×3 area
    let cleared = 0;
    for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
      const nr=r+dr, nc=c+dc;
      if (nr>=0&&nr<rows&&nc>=0&&nc<cols&&board[nr][nc]!==null) {
        board[nr][nc] = null; cleared++;
      }
    }
    state.score += cleared * 15;
    showFloatScore(`+${cleared*15}`, r, c);
    applyGravity();
    renderBoard();
    await sleep(300);
    await resolveMatches();
  }
  else if (type === 'lightning') {
    // Remove whole row + col
    let cleared = 0;
    for (let cc=0; cc<cols; cc++) if(board[r][cc]!==null){ board[r][cc]=null; cleared++; }
    for (let rr=0; rr<rows; rr++) if(board[rr][c]!==null){ board[rr][c]=null; cleared++; }
    state.score += cleared * 12;
    showFloatScore(`+${cleared*12}`, r, c);
    applyGravity();
    renderBoard();
    await sleep(300);
    await resolveMatches();
  }
  else if (type === 'shuffle') {
    // Reshuffle board
    createBoard();
    renderBoard();
    state.score += 20;
  }

  updateUI();
  state.processing = false;
}

// ── WIN / LOSE ────────────────────────────────────────────
function checkWinLose() {
  if (state.score >= state.target) {
    setTimeout(() => showToast('win'), 300);
    return;
  }
  if (state.moves <= 0) {
    if (state.score >= state.target) {
      setTimeout(() => showToast('win'), 300);
    } else {
      state.lives--;
      if (state.lives <= 0) state.lives = 0;
      setTimeout(() => showToast('lose'), 300);
    }
  }
}

// ── RENDER ────────────────────────────────────────────────
function renderBoard() {
  const grid = document.getElementById('gridEl');
  const { board, rows, cols, selected } = state;
  const size = cellSize();

  grid.style.gridTemplateColumns = `repeat(${cols}, ${size}px)`;
  grid.innerHTML = '';

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      const v = board[r][c];
      cell.className = `cell ${COLOR_CLASS[v]}`;
      cell.style.width = cell.style.height = `${size}px`;
      cell.style.fontSize = `${Math.floor(size * 0.55)}px`;
      cell.textContent = v !== null ? ANIMALS[v] : '';
      cell.dataset.r = r; cell.dataset.c = c;

      if (selected && selected.r === r && selected.c === c) {
        cell.classList.add('selected');
      }
      cell.addEventListener('click', () => cellClicked(r, c));
      grid.appendChild(cell);
    }
  }
}

// ── UI UPDATES ─────────────────────────────────────────────
function updateUI() {
  const { score, moves, target, level, lives } = state;
  document.getElementById('scoreEl').textContent = score.toLocaleString();
  document.getElementById('movesEl').textContent = moves;
  document.getElementById('targetEl').textContent = target.toLocaleString();
  document.getElementById('levelNum').textContent = level;
  document.getElementById('progressScore').textContent = score.toLocaleString();
  document.getElementById('progressTarget').textContent = target.toLocaleString();

  const pct = Math.min(100, Math.round(score / target * 100));
  document.getElementById('progressFill').style.width = pct + '%';

  // Lives
  const livesEl = document.getElementById('livesEl');
  livesEl.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const h = document.createElement('span');
    h.className = 'heart' + (i >= lives ? ' lost' : '');
    h.textContent = '❤️';
    livesEl.appendChild(h);
  }

  // Moves color warning
  const movesEl = document.getElementById('movesEl');
  movesEl.style.color = moves <= 5 ? '#ff5555' : moves <= 10 ? '#ffb86c' : '#50fa7b';
}

function updateBoosterUI() {
  ['hammer','bomb','lightning','shuffle'].forEach(t => {
    const btn = document.getElementById('boost' + t.charAt(0).toUpperCase() + t.slice(1));
    const cnt = document.getElementById(t + 'Count');
    if (cnt) cnt.textContent = state.boosters[t];
    if (btn) {
      btn.classList.toggle('active', state.activeBooster === t);
      btn.style.opacity = state.boosters[t] <= 0 ? '0.4' : '1';
    }
  });
}

// ── ANIMATIONS ────────────────────────────────────────────
async function animatePop(coords) {
  coords.forEach(({r,c}) => {
    const el = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    if (el) el.classList.add('pop');
  });
  await sleep(320);
}

function showFloatScore(text, r, c) {
  const grid = document.getElementById('gridEl');
  const rect = grid.getBoundingClientRect();
  const size = cellSize();
  const gap = 6, pad = 12;
  const x = rect.left + pad + c * (size + gap) + size / 2;
  const y = rect.top + pad + r * (size + gap);

  const el = document.createElement('div');
  el.className = 'float-score';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

function showCombo(n) {
  const el = document.getElementById('comboBadge');
  el.textContent = `🔥 COMBO ×${n}!`;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1300);
}

// ── TOAST ─────────────────────────────────────────────────
function showToast(type) {
  const icon   = document.getElementById('toastIcon');
  const title  = document.getElementById('toastTitle');
  const msg    = document.getElementById('toastMsg');
  const btn    = document.getElementById('toastBtn');
  const toast  = document.getElementById('toast');

  if (type === 'win') {
    const stars = state.score >= state.target * 1.5 ? '⭐⭐⭐' :
                  state.score >= state.target * 1.2 ? '⭐⭐' : '⭐';
    icon.textContent = '🏆';
    title.textContent = 'Level Clear! ' + stars;
    msg.textContent = `Score: ${state.score.toLocaleString()} / Target: ${state.target.toLocaleString()}`;
    btn.textContent = 'Next Level ▶';
    btn.onclick = () => { closeToast(); startLevel(state.level + 1); };
    toast.classList.add('level-anim');
  } else {
    icon.textContent = state.lives <= 0 ? '💔' : '😢';
    title.textContent = state.lives <= 0 ? 'Game Over!' : 'Level Failed';
    msg.textContent = state.lives <= 0
      ? 'All lives lost. Start again!'
      : `Score: ${state.score.toLocaleString()} — Need ${state.target.toLocaleString()}`;
    btn.textContent = state.lives <= 0 ? 'Restart Game' : 'Try Again';
    btn.onclick = () => {
      closeToast();
      if (state.lives <= 0) { state.lives = 5; startLevel(1); }
      else restartLevel();
    };
    toast.classList.remove('level-anim');
  }

  document.getElementById('overlay').classList.add('show');
  toast.classList.add('show');
}

function closeToast() {
  document.getElementById('toast').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}

// ── LEVEL START ────────────────────────────────────────────
function startLevel(lvl) {
  if (lvl > 100) lvl = 100;
  const cfg = LEVELS[lvl - 1];
  state.level    = lvl;
  state.moves    = cfg.moves;
  state.target   = cfg.target;
  state.rows     = cfg.rows;
  state.cols     = cfg.cols;
  state.types    = cfg.types;
  state.score    = 0;
  state.selected = null;
  state.processing = false;
  state.activeBooster = null;

  createBoard();
  renderBoard();
  updateUI();
  updateBoosterUI();
}

function restartLevel() {
  closeToast();
  startLevel(state.level);
}

function nextLevelBtn() {
  if (state.level < 100) startLevel(state.level + 1);
  else showToast('win');
}

// ── UTIL ──────────────────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Resize handler
window.addEventListener('resize', () => renderBoard());

// ── START ─────────────────────────────────────────────────
startLevel(1);
</script>
